<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MeetingFlow — Prototype v2</title>
<style>
:root{--bg:#f7f7fb;--bg-card:#fff;--bg-sidebar:#14152a;--bg-sidebar-hover:#1f2140;--bg-sidebar-active:#2a2d5a;--fg:#1a1b2e;--fg-muted:#6b6f86;--fg-faint:#9aa0b4;--fg-sidebar:#e8e9f3;--fg-sidebar-muted:#9398b8;--border:#e6e8f0;--border-strong:#d3d6e3;--accent:#4f46e5;--accent-soft:#eef2ff;--success:#10b981;--success-soft:#d1fae5;--warn:#f59e0b;--warn-soft:#fef3c7;--danger:#ef4444;--danger-soft:#fee2e2;--shadow-sm:0 1px 2px rgba(15,18,40,.05);--shadow-md:0 4px 16px rgba(15,18,40,.08);--radius:10px;--radius-sm:6px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--fg);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
.shell{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:272px;flex-shrink:0;background:var(--bg-sidebar);color:var(--fg-sidebar);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:14px 13px 9px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo{font-size:15px;font-weight:700;display:flex;align-items:center;gap:7px;margin-bottom:2px}
.sb-logo-icon{width:22px;height:22px;border-radius:5px;background:linear-gradient(135deg,#6366f1,#a855f7);display:grid;place-items:center;font-size:11px;flex-shrink:0}
.sb-org{font-size:10px;color:var(--fg-sidebar-muted)}
.sb-quick{padding:7px 9px 4px;display:flex;gap:5px}
.sb-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:var(--fg-sidebar);border-radius:5px;padding:4px 9px;font-size:11px;cursor:pointer;transition:background .15s;white-space:nowrap}
.sb-btn:hover{background:rgba(255,255,255,.14)}
.sb-search{padding:0 9px 5px;position:relative}
.sb-search input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:var(--fg-sidebar);padding:5px 8px 5px 22px;border-radius:5px;font-size:11.5px;outline:none}
.sb-search input::placeholder{color:var(--fg-sidebar-muted)}
.sb-search-ico{position:absolute;left:17px;top:50%;transform:translateY(-50%);opacity:.4;font-size:11px;pointer-events:none}
.sb-section{font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--fg-sidebar-muted);text-transform:uppercase;padding:4px 13px 3px}
.sb-scroll{flex:1;overflow-y:auto;padding-bottom:8px}
.sb-nav{display:flex;align-items:center;gap:6px;padding:5px 13px;font-size:12px;color:var(--fg-sidebar-muted);cursor:pointer;transition:background .12s;user-select:none}
.sb-nav:hover,.sb-nav.active{background:var(--bg-sidebar-hover);color:var(--fg-sidebar)}
.sb-nav.active{background:var(--bg-sidebar-active)}
.sb-badge{font-size:10px;background:rgba(255,255,255,.1);padding:1px 5px;border-radius:7px;margin-left:auto}
.proj-row{display:flex;align-items:center;gap:6px;padding:5px 9px;cursor:pointer;transition:background .12s;user-select:none}
.proj-row:hover{background:var(--bg-sidebar-hover)}
.proj-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.proj-name{font-size:12px;font-weight:600;color:var(--fg-sidebar);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-chev{font-size:9px;color:var(--fg-sidebar-muted);transition:transform .15s;flex-shrink:0}
.proj-chev.open{transform:rotate(90deg)}
.proj-children{padding:1px 0 2px 16px}
.proj-drag-target{border-top:2px solid var(--accent) !important}
.proj-pin{visibility:hidden;padding:1px 3px;background:none;border:none;cursor:pointer;font-size:10px;flex-shrink:0;line-height:1;opacity:.45;transition:opacity .12s}
.proj-row:hover .proj-pin,.proj-pin.pinned{visibility:visible}
.proj-pin.pinned{opacity:1}
.story-row{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:4px;cursor:pointer;font-size:11.5px;color:var(--fg-sidebar-muted);transition:background .12s;margin-bottom:1px;user-select:none}
.story-row:hover{background:var(--bg-sidebar-hover);color:var(--fg-sidebar)}
.story-row.active{background:var(--bg-sidebar-active);color:var(--fg-sidebar)}
.story-chev{font-size:8px;color:var(--fg-sidebar-muted);transition:transform .15s;flex-shrink:0}
.story-chev.open{transform:rotate(90deg)}
.mtg-sb-row{display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:4px;font-size:11px;color:var(--fg-sidebar-muted);cursor:pointer;margin-bottom:1px;transition:background .12s;user-select:none}
.mtg-sb-row:hover{background:var(--bg-sidebar-hover);color:var(--fg-sidebar)}
.mtg-sb-row.active{background:var(--bg-sidebar-active);color:var(--fg-sidebar)}
.mtg-sb-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.18);flex-shrink:0}
.mtg-sb-dot.active{background:var(--accent)}
.sb-add-btn{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:4px;font-size:11px;color:var(--fg-sidebar-muted);background:transparent;border:none;cursor:pointer;width:100%;text-align:left;transition:background .12s}
.sb-add-btn:hover{background:var(--bg-sidebar-hover);color:var(--fg-sidebar)}
.sb-footer{padding:8px 10px;border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:6px;flex-shrink:0}
.sb-avatar{width:25px;height:25px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#a855f7);display:grid;place-items:center;font-size:10px;font-weight:700;color:white;flex-shrink:0}
.sb-user{font-size:11.5px;font-weight:600;color:var(--fg-sidebar);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-ico{background:transparent;border:1px solid rgba(255,255,255,.1);color:var(--fg-sidebar-muted);padding:3px 6px;border-radius:4px;font-size:11px;cursor:pointer}

/* MAIN */
.main{flex:1;display:flex;overflow:hidden}

/* TOPBAR */
.topbar{background:var(--bg-card);border-bottom:1px solid var(--border);padding:13px 22px 0;flex-shrink:0}
.breadcrumb{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.crumb{font-size:11.5px;color:var(--fg-muted);background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px 8px;cursor:pointer;transition:all .14s}
.crumb:hover{border-color:var(--accent);color:var(--accent)}
.crumb-sep{font-size:11px;color:var(--fg-faint)}
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:4px;padding:2px 7px;font-size:10.5px;font-weight:700;letter-spacing:.02em}

/* STORY VIEW */
.story-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.story-title-row{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.story-title{font-size:18px;font-weight:700;letter-spacing:-.02em}
.status-pill{padding:2px 9px;border-radius:7px;font-size:10.5px;font-weight:600}
.story-meta{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.meta-chip{font-size:11.5px;color:var(--fg-muted);display:flex;align-items:center;gap:4px}
.tabs{display:flex}
.tab{padding:8px 14px;font-size:12.5px;font-weight:500;cursor:pointer;background:none;border:none;color:var(--fg-muted);border-bottom:2px solid transparent;transition:all .14s;display:flex;align-items:center;gap:5px;white-space:nowrap;margin-bottom:-1px}
.tab:hover{color:var(--fg)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-badge{background:var(--accent-soft);color:var(--accent);border-radius:9px;padding:1px 6px;font-size:10px;font-weight:700}
.tab.active .tab-badge{background:var(--accent);color:white}
.tab-body{flex:1;overflow-y:auto;padding:16px 20px 40px}

/* MEETING CARD (story view) */
.add-mtg-btn{display:flex;align-items:center;gap:8px;width:100%;padding:11px 15px;background:var(--accent-soft);border:1.5px dashed rgba(79,70,229,.35);border-radius:var(--radius);color:var(--accent);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;margin-bottom:12px;text-align:left}
.add-mtg-btn:hover{background:rgba(79,70,229,.12);border-color:var(--accent)}
.mtg-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px;box-shadow:var(--shadow-sm);transition:box-shadow .14s,border-color .14s}
.mtg-card:hover{border-color:var(--border-strong);box-shadow:var(--shadow-md)}
.mtg-card-head{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;user-select:none}
.mtg-date-block{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:5px 10px;text-align:center;flex-shrink:0;min-width:46px}
.mtg-month{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--accent);letter-spacing:.05em}
.mtg-day{font-size:18px;font-weight:800;line-height:1.1;color:var(--fg)}
.mtg-info{flex:1;min-width:0}
.mtg-title{font-size:13px;font-weight:600;margin-bottom:3px;color:var(--fg)}
.mtg-meta{font-size:11.5px;color:var(--fg-muted);display:flex;gap:10px;flex-wrap:wrap}
.mtg-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tasks-pill{border-radius:9px;padding:2px 8px;font-size:10.5px;font-weight:600;background:var(--success-soft);color:var(--success)}
.expand-ico{color:var(--fg-faint);font-size:10px;transition:transform .2s;padding:3px;background:none;border:none;cursor:pointer;flex-shrink:0}
.expand-ico.open{transform:rotate(180deg)}
.open-link{font-size:11.5px;color:var(--accent);background:var(--accent-soft);border:none;border-radius:var(--radius-sm);padding:4px 10px;cursor:pointer;font-weight:500;white-space:nowrap}
.open-link:hover{background:rgba(79,70,229,.15)}
.mtg-body{border-top:1px solid var(--border);padding:14px 16px;display:none}
.mtg-body.open{display:block}
.body-grid{display:grid;gap:12px}
.body-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--fg-faint);margin-bottom:5px}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:2px 10px;font-size:11.5px;color:var(--fg-muted)}
.notes-box{font-size:12.5px;color:var(--fg-muted);line-height:1.65;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 13px}
.mini-tasks{display:flex;flex-direction:column;gap:3px}
.mini-task{display:flex;align-items:center;gap:8px;padding:5px 10px;background:var(--bg);border-radius:var(--radius-sm);font-size:12px;cursor:pointer}
.mini-task:hover{background:var(--border)}
.mini-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.mini-task.done .mini-task-txt{text-decoration:line-through;opacity:.5}
.mini-assignee{margin-left:auto;font-size:11px;color:var(--fg-muted);flex-shrink:0}

/* STORY AI SUMMARY */
.story-ai-summary{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin:0 20px 14px;box-shadow:var(--shadow-sm);position:relative}
.story-ai-summary.collapsed{padding-bottom:12px}
.sas-header{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.sas-icon{font-size:14px;flex-shrink:0}
.sas-label{font-size:11.5px;font-weight:700;color:var(--fg-muted);text-transform:uppercase;letter-spacing:.05em;flex:1}
.sas-toggle{font-size:11px;color:var(--fg-faint);background:none;border:none;cursor:pointer;padding:0;font-family:inherit;transition:color .14s}
.sas-toggle:hover{color:var(--fg)}
.sas-body{margin-top:10px;font-size:13px;color:var(--fg);line-height:1.65}
.sas-body p{margin:0 0 8px}
.sas-body p:last-child{margin-bottom:0}
.sas-body ul{margin:4px 0 8px 16px;padding:0}
.sas-body li{margin-bottom:3px}
.sas-meta{margin-top:8px;font-size:11px;color:var(--fg-faint);display:flex;align-items:center;gap:8px}
.sas-actions{display:flex;align-items:center;gap:6px}
.sas-gen-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 10px;font-size:11.5px;color:var(--fg-muted);cursor:pointer;transition:all .14s;font-family:inherit}
.sas-gen-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
@keyframes sas-pulse{0%,100%{opacity:.6}50%{opacity:1}}
.sas-generating{animation:sas-pulse 1.2s ease infinite;color:var(--accent);font-size:12.5px}

/* MEETING EDITOR */
.mtg-editor-wrap{flex:1;display:flex;overflow:hidden}
.mtg-editor-left{flex:1;display:flex;flex-direction:column;overflow:hidden}
.mtg-editor-topbar{background:var(--bg-card);border-bottom:1px solid var(--border);padding:13px 22px;flex-shrink:0}
.mtg-title-editable{font-size:20px;font-weight:700;letter-spacing:-.02em;border:none;background:transparent;color:var(--fg);outline:none;width:100%;padding:2px 4px;border-radius:4px;transition:background .14s}
.mtg-title-editable:hover{background:var(--bg)}
.mtg-title-editable:focus{background:var(--accent-soft);outline:2px solid var(--accent);outline-offset:0}
.editor-meta-row{display:flex;align-items:center;gap:14px;margin-top:7px}
.editor-body{flex:1;overflow-y:auto;padding:20px 22px 40px}
.editor-section{margin-bottom:22px}
.editor-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--fg-faint);margin-bottom:8px}
.attendee-input-row{display:flex;gap:6px;align-items:center}
.attendee-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;font-size:12.5px;color:var(--fg);outline:none}
.attendee-input:focus{border-color:var(--accent);background:var(--accent-soft)}
.notes-editor{width:100%;min-height:180px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;font-size:13px;color:var(--fg);line-height:1.7;outline:none;resize:vertical;font-family:inherit}
.notes-editor:focus{border-color:var(--accent)}
.mom-display{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px}
.mom-block{margin-bottom:16px}.mom-block:last-child{margin-bottom:0}
.mom-heading{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-muted);margin-bottom:8px}
.mom-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:5px}
.mom-list li{font-size:12.5px;color:var(--fg);padding-left:14px;position:relative;line-height:1.55}
.mom-list li::before{content:'•';position:absolute;left:0;color:var(--accent);font-weight:700}
.mom-empty{font-size:12.5px;color:var(--fg-muted);opacity:.6;font-style:italic;padding:8px 0}
.ai-summary-box{background:linear-gradient(135deg,rgba(99,102,241,.06),rgba(168,85,247,.06));border:1px solid rgba(99,102,241,.2);border-radius:var(--radius);padding:14px 16px}
.ai-summary-text{font-size:12.5px;line-height:1.7;color:var(--fg-muted)}
.ai-typing::after{content:"▊";animation:blink .7s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.gen-btn{background:linear-gradient(135deg,#6366f1,#a855f7);color:white;border:none;border-radius:var(--radius-sm);padding:7px 14px;font-size:12.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity .14s}
.gen-btn:hover{opacity:.88}
.gen-btn:disabled{opacity:.55;cursor:not-allowed}
.add-task-row{display:flex;gap:6px;margin-bottom:8px}
.add-task-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;font-size:12.5px;color:var(--fg);outline:none}
.add-task-input:focus{border-color:var(--accent)}
/* meeting action items — read-only */
.action-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:5px;cursor:pointer;transition:all .14s}
.action-item:hover{border-color:var(--border-strong);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.ai-title{font-size:12.5px;flex:1;color:var(--fg);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ai-due{font-size:10.5px;color:var(--fg-muted);flex-shrink:0}
.ai-due.overdue{color:var(--danger);font-weight:600}
/* KANBAN */
.kanban-board{display:flex;gap:12px;overflow-x:auto;padding:2px 0 16px;min-height:0;flex:1}
.kanban-col{flex:0 0 240px;display:flex;flex-direction:column;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.kc-head{padding:10px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.kc-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.kc-count{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:0 7px;font-size:10.5px;font-weight:700;color:var(--fg-muted)}
.kc-body{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;min-height:80px}
.kanban-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 11px;cursor:pointer;transition:all .14s}
.kanban-card:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(79,70,229,.1)}
.kcard-title{font-size:12.5px;font-weight:500;color:var(--fg);line-height:1.4;margin-bottom:6px}
.kcard-desc{font-size:11px;color:var(--fg-muted);line-height:1.4;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.kcard-footer{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.kcard-prio{font-size:10px;font-weight:600;padding:1px 6px;border-radius:5px}
.kcard-due{font-size:10px;color:var(--fg-muted)}
.kcard-due.overdue{color:var(--danger);font-weight:600}
.kcard-av{width:18px;height:18px;border-radius:50%;font-size:9px;font-weight:700;display:grid;place-items:center;margin-left:auto;flex-shrink:0}
.kc-add{border:none;background:none;width:100%;padding:8px 12px;font-size:12px;color:var(--fg-muted);cursor:pointer;text-align:left;border-top:1px solid var(--border);transition:all .14s;font-family:inherit;flex-shrink:0}
.kc-add:hover{background:var(--accent-soft);color:var(--accent)}
.kc-body.drag-over{background:var(--accent-soft);border-radius:var(--radius-sm);outline:2px dashed rgba(79,70,229,.4)}
.kanban-card.dragging{opacity:.4;cursor:grabbing}
/* COMPLETION FORM */
.cf-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1100;display:flex;align-items:center;justify-content:center;padding:24px;overflow-y:auto}
.cf-modal{background:var(--bg-card);border-radius:var(--radius);width:100%;max-width:580px;box-shadow:0 24px 64px rgba(0,0,0,.25);overflow:hidden;max-height:90vh;display:flex;flex-direction:column}
.cf-head{padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.cf-title{font-size:15px;font-weight:700;color:var(--fg);margin-bottom:2px}
.cf-sub{font-size:12px;color:var(--fg-muted)}
.cf-body{padding:16px 20px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;flex:1}
.cf-input-tabs{display:flex;gap:6px;flex-wrap:wrap}
.cf-tab{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--radius-sm);font-size:12.5px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--bg);color:var(--fg-muted);transition:all .14s;font-family:inherit}
.cf-tab:hover{border-color:var(--border-strong);color:var(--fg)}
.cf-tab.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.cf-input-area{display:flex;flex-direction:column;gap:10px}
.cf-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-faint);margin-bottom:4px}
.cf-textarea{width:100%;min-height:90px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;color:var(--fg);outline:none;resize:vertical;font-family:inherit;line-height:1.6;box-sizing:border-box}
.cf-textarea:focus{border-color:var(--accent)}
.cf-dropzone{border:1.5px dashed var(--border-strong);border-radius:var(--radius-sm);padding:18px;text-align:center;cursor:pointer;font-size:12.5px;color:var(--fg-muted);transition:all .14s;background:var(--bg)}
.cf-dropzone:hover{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.cf-attachments{display:flex;flex-wrap:wrap;gap:6px}
.cf-attachment{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 10px;font-size:12px;color:var(--fg)}
.cf-attachment button{background:none;border:none;cursor:pointer;color:var(--fg-faint);font-size:13px;padding:0;line-height:1}
.cf-attachment button:hover{color:var(--danger)}
.cf-record-btn{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid rgba(239,68,68,.3);background:rgba(239,68,68,.06);color:var(--danger);transition:all .14s;font-family:inherit;width:100%;justify-content:center}
.cf-record-btn.recording{background:var(--danger);color:white;border-color:var(--danger);animation:rec-pulse 1.2s ease infinite}
@keyframes rec-pulse{0%,100%{opacity:1}50%{opacity:.8}}
.cf-recording-chip{display:flex;align-items:center;gap:8px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:var(--radius-sm);padding:8px 12px;font-size:12.5px;color:var(--danger)}
.cf-result-box{background:linear-gradient(135deg,rgba(99,102,241,.05),rgba(16,185,129,.05));border:1px solid rgba(99,102,241,.18);border-radius:var(--radius-sm);padding:14px 16px;font-size:12.5px;color:var(--fg);line-height:1.7}
.cf-result-box h3{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);font-weight:700;margin:12px 0 4px}
.cf-result-box h3:first-child{margin-top:0}
.cf-result-box ul{margin:0 0 4px 14px;padding:0}
.cf-result-box li{margin-bottom:2px}
.cf-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
/* TASK MODAL */
.task-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto}
.task-modal{background:var(--bg-card);border-radius:var(--radius);width:100%;max-width:780px;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2);min-height:0}
.tm-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px}
.tm-task-id{display:inline-block;font-size:11px;font-weight:700;font-family:monospace;color:var(--accent);letter-spacing:.04em;margin-bottom:5px;cursor:pointer;text-decoration:none;padding:1px 0;border-bottom:1px dashed rgba(79,70,229,.4);transition:all .12s}
.tm-task-id:hover{color:#3730a3;border-bottom-color:#3730a3}
.tm-title-input{width:100%;font-size:17px;font-weight:700;border:none;background:transparent;color:var(--fg);outline:none;font-family:inherit;padding:2px 0;box-sizing:border-box}
.tm-title-input::placeholder{color:var(--fg-faint)}
.tm-close{background:none;border:none;font-size:20px;color:var(--fg-muted);cursor:pointer;padding:0 4px;line-height:1;flex-shrink:0}
.tm-body{display:flex;flex:1;overflow:hidden}
.tm-main{flex:1;padding:18px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
.tm-sidebar{width:200px;flex-shrink:0;border-left:1px solid var(--border);padding:16px 14px;display:flex;flex-direction:column;gap:14px;background:var(--bg)}
.tm-field-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-faint);margin-bottom:5px}
.tm-select{width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 8px;font-size:12px;color:var(--fg);outline:none;cursor:pointer;font-family:inherit}
.tm-date-input{width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 8px;font-size:12px;color:var(--fg);outline:none;font-family:inherit}
.tm-desc{width:100%;min-height:100px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;color:var(--fg);outline:none;resize:vertical;font-family:inherit;line-height:1.6;box-sizing:border-box}
.tm-desc:focus{border-color:var(--accent)}
.tm-attach-zone{border:1.5px dashed var(--border);border-radius:var(--radius-sm);padding:14px;text-align:center;cursor:pointer;font-size:12px;color:var(--fg-muted);transition:all .14s}
.tm-attach-zone:hover{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.tm-divider{border:none;border-top:1px solid var(--border);margin:4px 0}
.activity-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-faint);margin-bottom:10px}
.comment{display:flex;gap:9px;margin-bottom:12px}
.comment-av{width:26px;height:26px;border-radius:50%;font-size:11px;font-weight:700;display:grid;place-items:center;flex-shrink:0}
.comment-body{flex:1;min-width:0}
.comment-meta{font-size:10.5px;color:var(--fg-muted);margin-bottom:3px}
.comment-meta b{color:var(--fg);font-weight:600}
.comment-text{font-size:12.5px;color:var(--fg);line-height:1.5;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px}
.comment-input-row{display:flex;gap:8px;align-items:flex-start}
.comment-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-size:12.5px;color:var(--fg);outline:none;resize:none;font-family:inherit;min-height:36px}
.comment-input:focus{border-color:var(--accent)}
.tm-save{background:var(--accent);color:white;border:none;border-radius:var(--radius-sm);padding:8px 18px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .14s;flex-shrink:0}
.tm-save:hover{opacity:.88}
/* Priority pill colours */
.prio-urgent{background:var(--danger-soft);color:var(--danger)}
.prio-high{background:var(--warn-soft);color:#b45309}
.prio-medium{background:var(--accent-soft);color:var(--accent)}
.prio-low{background:var(--bg);color:var(--fg-muted);border:1px solid var(--border)}
.tli-assign{font-size:10.5px;color:var(--fg-muted);background:var(--bg-card);border:1px solid var(--border);border-radius:3px;padding:1px 5px;flex-shrink:0;cursor:pointer}

/* MEETING EDITOR RIGHT PANEL */
.mtg-editor-right{width:250px;flex-shrink:0;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--bg-card)}
.er-head{padding:12px 14px;border-bottom:1px solid var(--border);font-size:12.5px;font-weight:700;flex-shrink:0}
.er-scroll{flex:1;overflow-y:auto;padding:12px}
.er-section{margin-bottom:16px}
.er-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--fg-faint);margin-bottom:6px}
.er-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.er-stat{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;text-align:center}
.er-stat-val{font-size:20px;font-weight:800;color:var(--fg)}
.er-stat-lbl{font-size:10px;color:var(--fg-muted)}
.er-person{display:flex;align-items:center;gap:7px;padding:5px 6px;border-radius:var(--radius-sm);font-size:12px;color:var(--fg-muted)}
.er-avatar{width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:700;display:grid;place-items:center;flex-shrink:0}

/* INBOX VIEW */
.inbox-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.board-filters{display:flex;align-items:center;gap:7px;padding:10px 22px 12px;flex-wrap:wrap}
.board-search{display:flex;align-items:center;gap:7px;background:var(--bg);border:1.5px solid var(--border);border-radius:20px;padding:6px 13px;flex:0 0 260px;transition:border-color .15s,box-shadow .15s}
.board-search:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,70,229,.08)}
.board-search input{border:none;background:transparent;font-size:12.5px;color:var(--fg);outline:none;flex:1;min-width:0}
.board-search input::placeholder{color:var(--fg-faint)}
.filter-dropdown{position:relative}
.filter-btn{display:flex;align-items:center;gap:5px;padding:5px 13px;border:1.5px solid var(--border);border-radius:20px;background:var(--bg-card);color:var(--fg-muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.filter-btn:hover{border-color:rgba(79,70,229,.4);color:var(--fg);background:var(--bg)}
.filter-btn.active{border-color:var(--accent);color:#fff;background:var(--accent);box-shadow:0 1px 6px rgba(79,70,229,.3)}
.filter-btn.active:hover{background:#4338ca}
.filter-panel{position:absolute;top:calc(100% + 6px);left:0;min-width:185px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.12);z-index:200;overflow:hidden;display:none;padding:4px 0}
.filter-panel.open{display:block}
.fpi{padding:8px 14px;font-size:12.5px;color:var(--fg);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .12s}
.fpi:hover{background:var(--bg)}
.fpi.sel{color:var(--accent);font-weight:600}
.fpi-check{width:14px;font-size:10px;flex-shrink:0;text-align:center;color:var(--accent)}
.filter-sep{height:1px;background:var(--border);margin:4px 0}
.nbt-tab{flex:1;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg-card);color:var(--fg-muted);font-size:12.5px;font-weight:500;cursor:pointer;transition:all .14s;font-family:inherit}
.nbt-tab:hover{border-color:rgba(79,70,229,.4);color:var(--fg)}
.nbt-tab.active{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);font-weight:600}
.inbox-head{background:var(--bg-card);border-bottom:1px solid var(--border);padding:18px 22px;flex-shrink:0}
.inbox-title{font-size:20px;font-weight:700;letter-spacing:-.02em}
.inbox-sub{font-size:13px;color:var(--fg-muted);margin-top:2px}
.inbox-body{flex:1;overflow-y:auto;padding:18px 22px 40px}
.inbox-group{margin-bottom:20px}
.inbox-group-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--fg-faint);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.inbox-task{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:5px;cursor:pointer;transition:all .14s;box-shadow:var(--shadow-sm)}
.inbox-task:hover{border-color:var(--border-strong);box-shadow:var(--shadow-md)}

/* MEMO/VOICE/FILES tabs */
.memo-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow-sm);cursor:pointer;transition:all .14s}
.memo-card:hover{border-color:var(--border-strong);box-shadow:var(--shadow-md)}
.memo-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.memo-title{font-size:13px;font-weight:600}
.memo-body{font-size:12.5px;color:var(--fg-muted);line-height:1.65}
.voice-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:10px;box-shadow:var(--shadow-sm);cursor:pointer;transition:all .14s}
.voice-card:hover{border-color:var(--border-strong);box-shadow:var(--shadow-md)}
.play-btn{width:34px;height:34px;border-radius:50%;background:var(--accent-soft);border:1px solid rgba(79,70,229,.25);color:var(--accent);display:grid;place-items:center;cursor:pointer;font-size:12px;flex-shrink:0;transition:all .14s}
.play-btn:hover{background:var(--accent);color:white}
.waveform{flex:1;height:26px;background:var(--bg);border-radius:4px;display:flex;align-items:center;padding:0 6px;gap:2px;overflow:hidden}
.wbar{width:3px;border-radius:2px;background:var(--accent);opacity:.35;flex-shrink:0}
.file-row{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;cursor:pointer;transition:all .14s;box-shadow:var(--shadow-sm)}
.file-row:hover{border-color:var(--border-strong);box-shadow:var(--shadow-md)}
.drop-zone{padding:20px;background:var(--bg);border:1.5px dashed var(--border-strong);border-radius:var(--radius);text-align:center;color:var(--fg-muted);font-size:12.5px;cursor:pointer;transition:all .14s;margin-top:10px}
.drop-zone:hover{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}

/* FILTER CHIPS */
.fchip{padding:4px 11px;border-radius:9px;font-size:11.5px;cursor:pointer;background:none;border:1px solid transparent;color:var(--fg-muted);transition:all .14s;white-space:nowrap;font-family:inherit}
.fchip.active{background:var(--accent-soft);color:var(--accent);border-color:rgba(79,70,229,.25)}
.fchip:hover:not(.active){background:var(--bg);border-color:var(--border)}

/* BUTTONS */
.btn-primary{background:var(--accent);color:white;border:none;border-radius:var(--radius-sm);padding:6px 13px;font-size:12.5px;font-weight:500;cursor:pointer;transition:background .14s}
.btn-primary:hover{background:#4338ca}
.btn-ghost{background:var(--bg-card);color:var(--fg-muted);border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 11px;font-size:12px;cursor:pointer;transition:all .14s}
.btn-ghost:hover{border-color:var(--border-strong);color:var(--fg)}
.btn-danger{background:var(--danger-soft);color:var(--danger);border:1px solid rgba(239,68,68,.2);border-radius:var(--radius-sm);padding:5px 11px;font-size:12px;cursor:pointer;transition:all .14s}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(15,18,40,.45);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px)}
.modal-box{background:var(--bg-card);border-radius:var(--radius);box-shadow:0 20px 60px rgba(15,18,40,.2);padding:24px;width:420px;max-width:90vw}
.modal-title{font-size:15px;font-weight:700;margin-bottom:4px}
.modal-sub{font-size:12.5px;color:var(--fg-muted);margin-bottom:16px}
.modal-field{margin-bottom:12px}
.modal-label{font-size:11px;font-weight:600;color:var(--fg-muted);margin-bottom:4px}
.modal-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 11px;font-size:13px;color:var(--fg);outline:none;font-family:inherit}
.modal-input:focus{border-color:var(--accent)}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}

/* PROJECT VIEW */
.proj-stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:0}
.proj-stat{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;text-align:center}
.proj-stat-val{font-size:22px;font-weight:800;color:var(--fg)}
.proj-stat-lbl{font-size:10.5px;color:var(--fg-muted);margin-top:1px}
.story-overview-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px;box-shadow:var(--shadow-sm);transition:box-shadow .14s,border-color .14s;cursor:pointer}
.story-overview-card:hover{border-color:var(--border-strong);box-shadow:var(--shadow-md)}
.soc-head{display:flex;align-items:center;gap:12px;padding:13px 16px}
.soc-icon{width:30px;height:30px;border-radius:7px;background:var(--accent-soft);display:grid;place-items:center;font-size:14px;flex-shrink:0}
.soc-info{flex:1;min-width:0}
.soc-name{font-size:13px;font-weight:600;margin-bottom:2px}
.soc-meta{font-size:11.5px;color:var(--fg-muted);display:flex;gap:10px}
.soc-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.soc-body{border-top:1px solid var(--border);padding:10px 16px}
.prog-bar{height:4px;background:var(--border);border-radius:2px;margin:8px 0 10px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .3s}
.soc-mtg-list{display:flex;flex-direction:column;gap:4px}
.soc-mtg-row{display:flex;align-items:center;gap:8px;padding:5px 10px;background:var(--bg);border-radius:var(--radius-sm);font-size:11.5px;color:var(--fg-muted);cursor:pointer;transition:background .12s}
.soc-mtg-row:hover{background:var(--border);color:var(--fg)}
.soc-mtg-date{width:28px;height:22px;border-radius:4px;background:var(--accent-soft);color:var(--accent);font-size:10px;font-weight:700;display:grid;place-items:center;flex-shrink:0}
.proj-row.active-proj .proj-name{color:var(--fg-sidebar)}

/* CONTENT CREATION MODAL */
.modal-box.wide{width:580px}
.input-method-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.input-method-card{border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 10px;cursor:pointer;transition:all .15s;text-align:center;background:var(--bg)}
.input-method-card:hover{border-color:var(--accent);background:var(--accent-soft)}
.input-method-card.selected{border-color:var(--accent);background:var(--accent-soft)}
.imc-icon{font-size:22px;margin-bottom:5px}
.imc-label{font-size:12.5px;font-weight:600;color:var(--fg);margin-bottom:2px}
.imc-sub{font-size:10.5px;color:var(--fg-muted)}
.content-input-area{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);min-height:120px;overflow:hidden;transition:border-color .14s}
.content-input-area:focus-within{border-color:var(--accent)}
.content-textarea{width:100%;min-height:120px;background:transparent;border:none;padding:12px 14px;font-size:13px;color:var(--fg);line-height:1.7;outline:none;resize:vertical;font-family:inherit}
.file-drop-area{padding:28px 20px;text-align:center;cursor:pointer;transition:all .15s}
.file-drop-area:hover,.file-drop-area.dragover{background:var(--accent-soft)}
.file-drop-icon{font-size:28px;margin-bottom:7px}
.file-drop-label{font-size:13px;font-weight:500;color:var(--fg-muted);margin-bottom:3px}
.file-drop-sub{font-size:11px;color:var(--fg-faint)}
.ai-action-row{display:flex;align-items:center;gap:8px;margin-top:12px}
.btn-ai{background:linear-gradient(135deg,#6366f1,#a855f7);color:white;border:none;border-radius:var(--radius-sm);padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;transition:opacity .14s}
.btn-ai:hover{opacity:.88}
.btn-ai:disabled{opacity:.5;cursor:not-allowed}
.btn-quick{background:var(--warn-soft);color:#b45309;border:1px solid rgba(245,158,11,.3);border-radius:var(--radius-sm);padding:7px 14px;font-size:13px;font-weight:500;cursor:pointer}
.btn-quick:hover{background:rgba(245,158,11,.2)}
.ai-hint{font-size:11.5px;color:var(--fg-faint);margin-top:5px}
.ai-hint b{color:var(--fg-muted)}
.ai-processing{display:flex;align-items:center;gap:10px;padding:14px 16px;background:linear-gradient(135deg,rgba(99,102,241,.06),rgba(168,85,247,.06));border:1px solid rgba(99,102,241,.2);border-radius:var(--radius-sm);font-size:13px;color:var(--fg-muted)}
.ai-spinner{width:16px;height:16px;border:2px solid rgba(99,102,241,.25);border-top-color:#6366f1;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-typing-cursor::after{content:"▊";animation:blink .6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.extracted-tasks{margin-top:14px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.et-header{padding:9px 13px;background:var(--success-soft);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--success)}
.et-task-row{display:flex;align-items:center;gap:8px;padding:8px 13px;border-bottom:1px solid var(--border);background:var(--bg-card)}
.et-task-row:last-child{border-bottom:none}
.et-check{width:14px;height:14px;border:1.5px solid var(--success);border-radius:3px;flex-shrink:0;background:var(--success);display:grid;place-items:center;color:white;font-size:9px}
.et-task-txt{flex:1;font-size:12.5px;color:var(--fg);background:none;border:none;outline:none;font-family:inherit}
.et-del{background:none;border:none;color:var(--fg-faint);cursor:pointer;font-size:13px;padding:1px 4px;border-radius:3px}
.et-del:hover{background:var(--danger-soft);color:var(--danger)}
.et-add{width:100%;padding:7px 13px;background:var(--bg);border:none;border-top:1px solid var(--border);text-align:left;font-size:12px;color:var(--fg-muted);cursor:pointer;display:flex;align-items:center;gap:6px}
.et-add:hover{background:var(--accent-soft);color:var(--accent)}
.modal-tabs{display:flex;border-bottom:1px solid var(--border);margin:-24px -24px 18px}
.modal-tab{padding:10px 18px;font-size:13px;font-weight:500;cursor:pointer;color:var(--fg-muted);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;transition:all .14s}
.modal-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
/* ATTENDEE TAGGER */
.attendee-tagger{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 8px;display:flex;flex-wrap:wrap;gap:5px;cursor:text;min-height:38px;align-items:center;transition:border-color .14s}
.attendee-tagger:focus-within{border-color:var(--accent)}
.at-chip{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 8px 3px 10px;font-size:12px;font-weight:500;white-space:nowrap;background:var(--accent-soft);color:var(--accent)}
.at-chip.registered{background:var(--success-soft);color:#065f46}
.at-chip-del{background:none;border:none;color:inherit;cursor:pointer;font-size:13px;line-height:1;opacity:.6;padding:0 1px;display:flex;align-items:center}
.at-chip-del:hover{opacity:1}
.at-input{border:none;background:transparent;outline:none;font-size:12.5px;color:var(--fg);min-width:100px;flex:1;padding:2px 2px;font-family:inherit}
.at-dropdown{border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-card);box-shadow:var(--shadow-md);overflow:hidden;margin-top:3px;display:none;max-height:200px;overflow-y:auto}
.at-dropdown.show{display:block}
.at-option{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:12.5px;color:var(--fg);transition:background .12s}
.at-option:hover{background:var(--accent-soft)}
.at-option-ext{color:var(--fg-muted);border-top:1px solid var(--border);font-style:italic}
.at-option-ext:hover{background:var(--bg);color:var(--fg)}
.at-av{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:10px;font-weight:700;flex-shrink:0}

/* TOAST */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(14px);background:#1a1b2e;color:white;padding:8px 14px;border-radius:7px;font-size:13px;box-shadow:0 20px 50px rgba(15,18,40,.2);opacity:0;transition:all .22s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

    'saint-goban': {id:'saint-goban', projectId:'lavani', name:'Saint Goban Meeting', status:'in_progress', dueDate:'2026-07-30', assignees:['Rey','Bintang','Cakra'], aiSummary:`<p><strong>Co-branding deal with Saint-Gobain for SEA division is progressing.</strong> 3 meetings held across June–July 2026, with 14 tasks generated.</p><p><strong>What's been decided:</strong> 3 colorways approved (Ivory White, Slate Grey, Deep Navy), budget confirmed at USD 120,000, payment terms settled at Net-30 + 30% upfront deposit after negotiation from Net-60. NDA signed.</p><p><strong>Outstanding:</strong> Sample pack delivery (due Jul 31), proforma invoice USD 36K, final contract revision, and contract signing scheduled for Jul 8. Production handover pending contract sign-off.</p><p><strong>Risks:</strong> Contract signing meeting (Jul 8) has no notes or MoM yet — confirm this meeting has taken place and follow up on legal exclusivity clause.</p>`, summaryCollapsed:false},

  },
  meetings: {
    m1: {id:'m1', storyId:'saint-goban', title:'Kick-off — Saint-Gobain × Lavani', date:'2026-06-23', attendees:['Rey Putra','Bintang Aditya','Cakra Yudha','Jean-Paul (Saint-Gobain)'], notes:'Saint-Gobain interested in co-branding Lavani Fabric line for SEA division.\n\nMOQ of 5,000 units minimum. Samples needed by end of July.\n\nJean-Paul: budget approval needs Paris HQ sign-off — expected within 2 weeks.\n\nNDA sent and acknowledged by all parties.',
      mom:'<div class="mom-block"><div class="mom-heading">📋 Key Discussion Points</div><ul class="mom-list"><li>Saint-Gobain proposes co-branding Lavani Fabric line for the SEA division</li><li>MOQ: 5,000 units minimum — samples required by end of July</li><li>Budget approval pending Paris HQ sign-off (estimated 2 weeks)</li><li>NDA sent and acknowledged by all parties</li></ul></div><div class="mom-block"><div class="mom-heading">✅ Decisions Made</div><ul class="mom-list"><li>Proceed with sample preparation — 5 colorways</li><li>Hold contract finalization until Paris HQ budget is confirmed</li></ul></div><div class="mom-block"><div class="mom-heading">⚡ Next Steps</div><ul class="mom-list"><li><b>Rey</b> — Prepare sample pack (5 colorways) by July 31</li><li><b>Cakra</b> — Loop in legal on exclusivity clause</li><li><b>Cakra</b> — Confirm quality cert docs for Saint-Gobain</li><li><b>Jean-Paul</b> — Follow up with Paris HQ within 2 weeks</li></ul></div>',

    m3: {id:'m3', storyId:'saint-goban', title:'Contract Signing & Production Handover', date:'2026-07-08', attendees:['Rey Putra','Bintang Aditya','Cakra Yudha','Jean-Paul (SG)','Marie (SG Finance)'], notes:'', mom:'', taskIds:['t9','t10'], aiSummary:''},

  },

    t1: {id:'t1', title:'Prepare sample pack (5 colorways)', description:'Create physical sample packs with 5 colorway options: Ivory White, Slate Grey, Deep Navy, Terracotta, Sage Green. Each pack should include fabric swatches and a spec sheet.', status:'in_progress', priority:'high', dueDate:'2026-07-31', assignee:'R', meetingId:'m1', storyId:'saint-goban', source:'meeting', attachments:[], comments:[{id:'c1',authorId:'R',author:'Rey Putra',text:'Starting on Ivory White and Slate Grey first. Will send drafts by Friday.',date:'Jun 24'},{id:'c2',authorId:'B',author:'Bintang Aditya',text:'Can you include Pantone reference codes in the spec sheet?',date:'Jun 25'}]},

    t3: {id:'t3', title:'Confirm MOQ with production team', description:'Verify production can meet the 5,000 unit MOQ requirement from Saint-Gobain.', status:'done', priority:'high', dueDate:'2026-06-25', assignee:'C', meetingId:'m1', storyId:'saint-goban', source:'meeting', attachments:[], comments:[{id:'c3',authorId:'C',author:'Cakra Yudha',text:'Confirmed. Production can handle 5K units with 3-week lead time.',date:'Jun 25'}]},

    t6: {id:'t6', title:'Revise contract — Net-30 + 30% deposit', description:'Update the draft contract to reflect agreed payment terms: Net-30 with 30% upfront deposit. Remove Net-60 clause. Legal team to review before sending.', status:'review', priority:'urgent', dueDate:'2026-07-02', assignee:'R', meetingId:'m2', storyId:'saint-goban', source:'meeting', attachments:[], comments:[{id:'c4',authorId:'R',author:'Rey Putra',text:'Contract updated. Sent to legal for final review — should be back by tomorrow.',date:'Jul 1'}]},

    t8: {id:'t8', title:'Issue proforma invoice USD 36,000', description:'Issue proforma invoice for the 30% upfront deposit (30% × USD 120,000 = USD 36,000). Send to Marie at SG Finance.', status:'open', priority:'urgent', dueDate:'2026-07-05', assignee:'B', meetingId:'m2', storyId:'saint-goban', source:'meeting', attachments:[], comments:[]},
    t9: {id:'t9', title:'Prepare final contract for signing', description:'', status:'open', priority:'high', dueDate:'2026-07-08', assignee:'R', meetingId:'m3', storyId:'saint-goban', source:'meeting', attachments:[], comments:[]},
    t10:{id:'t10',title:'Notify production team after signing', description:'', status:'open', priority:'medium', dueDate:'2026-07-10', assignee:'C', meetingId:'m3', storyId:'saint-goban', source:'meeting', attachments:[], comments:[]},
    t11:{id:'t11',title:'Loop in legal if exclusivity raised', description:'', status:'open', priority:'low', dueDate:'', assignee:'R', storyId:'saint-goban', source:'memo', attachments:[], comments:[]},
    t12:{id:'t12',title:'Confirm quality cert docs for SG', description:'', status:'open', priority:'medium', dueDate:'2026-07-12', assignee:'C', storyId:'saint-goban', source:'memo', attachments:[], comments:[]},
    t13:{id:'t13',title:'Prepare talking points on pricing flexibility', description:'', status:'done', priority:'medium', dueDate:'2026-06-20', assignee:'R', storyId:'saint-goban', source:'voice', attachments:[], comments:[]},
    t14:{id:'t14',title:'Check warehouse capacity for sample storage', description:'', status:'open', priority:'low', dueDate:'2026-07-14', assignee:'C', storyId:'saint-goban', source:'voice', attachments:[], comments:[]},
    mt1:{id:'mt1',title:'Add Jean-Paul to WhatsApp and share quality cert template', description:'Save Jean-Paul contact on WhatsApp and send him the quality certification template we use for partner onboarding.', status:'done', priority:'medium', dueDate:'2026-06-21', assignee:'R', memoId:'mem1', storyId:'saint-goban', source:'memo', attachments:[], comments:[]},
    mt2:{id:'mt2',title:'Prepare quality cert docs package for SG review', description:'Compile all required quality certification documents Saint-Gobain needs for APAC procurement compliance.', status:'in_progress', priority:'high', dueDate:'2026-07-10', assignee:'C', memoId:'mem1', storyId:'saint-goban', source:'memo', attachments:[], comments:[]},
    mt3:{id:'mt3',title:'Confirm 8% margin floor with Finance before next SG call', description:'Get sign-off from Finance that 8% is the hard floor on co-branded items before entering pricing discussion with SG.', status:'done', priority:'urgent', dueDate:'2026-06-26', assignee:'R', memoId:'mem2', storyId:'saint-goban', source:'memo', attachments:[], comments:[]},
    mt4:{id:'mt4',title:'Brief legal team on exclusivity risk', description:'Loop in legal to understand implications of any exclusivity clause Saint-Gobain might propose for SEA territory.', status:'open', priority:'high', dueDate:'2026-07-08', assignee:'R', memoId:'mem2', storyId:'saint-goban', source:'memo', attachments:[], comments:[]},
  },
  memos: {
    mem1: {id:'mem1', storyId:'saint-goban', title:'Jean-Paul — Contact Notes', date:'2026-06-20', body:'VP Procurement APAC. Prefers WhatsApp for quick comms. Decision maker for APAC but needs Paris sign-off above USD 100K. Very detail-oriented about quality certifications.', taskIds:['mt1','mt2'], aiSummary:'Jean-Paul Mercier is VP Procurement APAC and the primary decision-maker for this deal. Decisions above USD 100K require Paris HQ sign-off. Prefers WhatsApp — keep comms tight and include quality cert docs in every update.'},
    mem2: {id:'mem2', storyId:'saint-goban', title:'Negotiation Red Lines', date:'2026-06-25', body:'Do NOT agree to Net-60. Minimum: Net-30 + 30% upfront. MOQ floor: 5,000 units. Cannot go below 8% margin on co-branded items. If they push exclusivity — loop in legal first.', taskIds:['mt3','mt4'], aiSummary:'Internal limits are set: Net-30 + 30% upfront is the floor on payment terms (Net-60 is a hard no). MOQ minimum is 5,000 units, margin floor is 8% on co-branded items. Any exclusivity clause must go to legal before committing.'},
  },
  voices: {
    v1: {id:'v1', storyId:'saint-goban', name:'Pre-call thoughts — Jun 23', duration:'1:42', date:'2026-06-23', by:'Rey Putra', transcript:'Thinking through our position before the kick-off. Main points: hold on MOQ minimum 5k, don\'t reveal our margin floor, let them open pricing first.'},
  },
  files: [
    {name:'SaintGobain_NDA_Draft.pdf',   size:'2.1 MB', date:'Jun 23', by:'Rey',    icon:'📄', storyId:'saint-goban'},
    {name:'Lavani_Cobranding_Proposal_v1.pptx', size:'4.8 MB', date:'Jun 25', by:'Bintang', icon:'📊', storyId:'saint-goban'},
    {name:'Contract_Net30_Final.docx',   size:'890 KB', date:'Jun 29', by:'Rey',    icon:'📝', storyId:'saint-goban'},
    {name:'Sample_Photos_3colorways.zip',size:'12.4 MB',date:'Jun 30', by:'Cakra',  icon:'🖼', storyId:'saint-goban'},
  ]
};

// ==================== STATE ====================
const S = {
  view: 'story',            // 'story' | 'meeting' | 'inbox'
  projectId: 'lavani',
  storyId: 'saint-goban',
  meetingId: null,
  storyTab: 'timeline',     // 'timeline' | 'files' | 'tasks'
  contentFilter: 'all',    // 'all' | 'meetings' | 'memos'
  meetingTab: 'notes',
  taskFilter: 'all',
  expandedMeetings: new Set(['m2']),
  expandedMemos: new Set(['mem1']),
  expandedProjects: {lavani:true, trial:false, test1:false},
  expandedStories: {'saint-goban':true},
  projectOrder: ['lavani','trial','test1'],
  pinnedProjects: new Set(),
  myBoardFilter: 'all',        // 'all' | 'assigned' | 'sent'
  myBoardSourceType: 'all',   // 'all' | 'meeting' | 'memo'
  myBoardPriority: 'all',     // 'all' | 'urgent' | 'high' | 'medium' | 'low'
  myBoardSearch: '',
  aiGenerating: false,
  _nextId: 100,
};

function uid(prefix) { return prefix + (++S._nextId); }

// Single canonical date formatter — takes ISO "YYYY-MM-DD", returns "Jul 2"
const _MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDate(iso) {
  if (!iso) return '';
  const parts = String(iso).split('-');
  if (parts.length < 3) return iso; // already formatted or invalid
  return _MO[parseInt(parts[1], 10) - 1] + ' ' + parseInt(parts[2], 10);
}

// ==================== TOAST ====================
let _toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

// ==================== ROUTING ====================
function pushHash(hash) {
  history.pushState(null, '', location.pathname + location.search + hash);
}

function routeFromHash() {
  const hash = location.hash.slice(1); // strip #
  const parts = hash.split('/');
  switch (parts[0]) {
    case 'settings':
      S.view = 'settings';
      break;
    case 'myboard':
    case 'inbox':
      S.view = 'myboard';
      break;
    case 'story':
      if (parts[1] && parts[2] && DB.stories[parts[2]]) {
        S.view = 'story'; S.projectId = parts[1]; S.storyId = parts[2];
        S.storyTab = S.storyTab || 'timeline';
        S.expandedProjects[parts[1]] = true;
        S.expandedStories[parts[2]] = true;
      }
      break;
    case 'meeting':
      if (parts[1] && DB.meetings[parts[1]]) {
        S.view = 'meeting'; S.meetingId = parts[1];
        const m = DB.meetings[parts[1]];
        if (m) { S.storyId = m.storyId; const st = DB.stories[m.storyId]; if (st) S.projectId = st.projectId; }
      }
      break;
    case 'project':
      if (parts[1] && DB.projects[parts[1]]) {
        S.view = 'project'; S.projectId = parts[1];
        S.expandedProjects[parts[1]] = true;
      }
      break;
    default:
      // no hash or unrecognised — stay on current view (first story on boot)
      break;
  }
  render();
}

window.addEventListener('popstate', routeFromHash);

// ==================== NAVIGATE ====================
function goStory(projectId, storyId) {
  S.view = 'story'; S.projectId = projectId; S.storyId = storyId;
  S.storyTab = 'timeline';
  S.expandedProjects[projectId] = true;
  S.expandedStories[storyId] = true;
  pushHash(`#story/${projectId}/${storyId}`);
  render();
}
function goMeeting(meetingId) {
  S.view = 'meeting'; S.meetingId = meetingId;
  const m = DB.meetings[meetingId];
  if (m) { S.storyId = m.storyId; const st = DB.stories[m.storyId]; if(st) S.projectId = st.projectId; }
  pushHash(`#meeting/${meetingId}`);
  render();
}
function goMyBoard() { S.view = 'myboard'; pushHash('#myboard'); render(); }
function goInbox()   { goMyBoard(); }
function goSettings() { S.view = 'settings'; pushHash('#settings'); render(); }
function goProject(projectId) {
  S.view = 'project'; S.projectId = projectId;
  S.expandedProjects[projectId] = true;
  pushHash(`#project/${projectId}`);
  render();
}
function goBack() { S.view = 'story'; pushHash(`#story/${S.projectId}/${S.storyId}`); render(); }

// ==================== ACTIONS ====================
function toggleProject(id) {
  S.expandedProjects[id] = !S.expandedProjects[id];
  renderSidebar();
}
function toggleStorySB(id) {
  S.expandedStories[id] = !S.expandedStories[id];
  renderSidebar();
}
function toggleMeetingCard(id) {
  if (S.expandedMeetings.has(id)) S.expandedMeetings.delete(id);
  else S.expandedMeetings.add(id);
  if (S.view === 'story') renderStoryMain();
}
function setStoryTab(tab) {
  S.storyTab = tab;
  document.querySelectorAll('#story-topbar .tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  renderStoryMain();
}
function setContentFilter(f) { S.contentFilter = f; renderStoryMain(); }
function setTaskFilter(f) { S.taskFilter = f; }

function toggleTask(taskId) {
  const t = DB.tasks[taskId];
  if (!t) return;
  if (t.status === 'done') t.status = 'open';
  else t.status = 'done';
  if (S.view === 'meeting') renderMeetingTaskList();
  if (S.view === 'story' && S.storyTab === 'timeline') renderStoryMain();
}

function saveNotes(meetingId, val) {
  if (DB.meetings[meetingId]) DB.meetings[meetingId].notes = val;
}
function saveTitle(meetingId, val) {
  if (DB.meetings[meetingId]) { DB.meetings[meetingId].title = val.trim() || 'Untitled Meeting'; }
  renderSidebar();
}

function addMeetingTask(meetingId) {
  const input = document.getElementById('new-task-input');
  const val = input ? input.value.trim() : '';
  if (!val) { toast('Enter a task title'); return; }
  const id = uid('t');
  DB.tasks[id] = {id, title:val, status:'open', assignee:'R', meetingId, source:'meeting'};
  DB.meetings[meetingId].taskIds.push(id);
  input.value = '';
  renderMeetingTaskList();
  toast('Task added');
}

function deleteMeetingTask(taskId, meetingId) {
  delete DB.tasks[taskId];
  const m = DB.meetings[meetingId];
  if (m) m.taskIds = m.taskIds.filter(x => x !== taskId);
  renderMeetingTaskList();
}

function generateAI(meetingId) {
  const m = DB.meetings[meetingId];
  if (!m) return;
  const box = document.getElementById('ai-summary-content');
  if (box) box.innerHTML = '<div class="ai-summary-text ai-typing">Summarising…</div>';
  const btn = document.getElementById('gen-ai-btn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Generating…'; }
  const summaries = [
    'Saint-Gobain proposes co-branding deal for SEA division. Key terms: MOQ 5,000 units, budget capped at Paris HQ approval, NDA in progress. Next steps: samples by July, await budget confirmation.',
    'Budget approved at USD 120K. Three colorways confirmed. Payment terms settled at Net-30 + 30% upfront after negotiation.',
    'Contract signing and production handover planned. All parties confirmed. Pre-read materials to be sent 48h in advance.'
  ];
  const summary = m.notes ? (meetingId === 'm2' ? summaries[1] : summaries[0]) : summaries[2];
  let i = 0; const words = summary.split(' ');
  if (box) box.innerHTML = '<div class="ai-summary-text ai-typing" id="ai-typing-text"></div>';
  const interval = setInterval(() => {
    const el = document.getElementById('ai-typing-text');
    if (!el || i >= words.length) {
      clearInterval(interval);
      m.aiSummary = summary;
      if (el) el.classList.remove('ai-typing');
      if (btn) { btn.disabled = false; btn.innerHTML = '✨ Regenerate'; }
      return;
    }
    el.textContent = words.slice(0,++i).join(' ');
  }, 55);
}

function generateMoM(meetingId) {
  const m = DB.meetings[meetingId];
  if (!m) return;
  const view = document.getElementById('mom-view');
  if (view) view.innerHTML = '<div class="mom-display"><div class="ai-summary-text ai-typing">Structuring minutes…</div></div>';
  const btn = event.target;
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Generating…'; }
  const momContent = '<div class="mom-block"><div class="mom-heading">📋 Key Discussion Points</div><ul class="mom-list"><li>Saint-Gobain proposes co-branding Lavani Fabric line for the SEA division</li><li>MOQ: 5,000 units minimum — samples required by end of July</li><li>Budget approval pending Paris HQ sign-off (estimated 2 weeks)</li><li>NDA sent and acknowledged by all parties</li></ul></div><div class="mom-block"><div class="mom-heading">✅ Decisions Made</div><ul class="mom-list"><li>Proceed with sample preparation — 5 colorways</li><li>Hold contract finalization until Paris HQ budget is confirmed</li></ul></div><div class="mom-block"><div class="mom-heading">⚡ Next Steps</div><ul class="mom-list"><li><b>Rey</b> — Prepare sample pack (5 colorways) by July 31</li><li><b>Cakra</b> — Loop in legal on exclusivity clause</li><li><b>Cakra</b> — Confirm quality cert docs for Saint-Gobain</li><li><b>Jean-Paul</b> — Follow up with Paris HQ within 2 weeks</li></ul></div>';
  setTimeout(() => {
    m.mom = momContent;

function processContentWithAI() {
  const btn = document.getElementById('btn-ai-process');
  if (btn) { btn.disabled=true; btn.innerHTML='<span class="ai-spinner" style="width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px"></span>Processing…'; }

  const taskPools = {
    paste:['Prepare sample pack with 5 colorways for review','Draft co-branding proposal PDF for Saint-Gobain','Confirm MOQ of 5,000 units with production team','Send revised contract with Net-30 + 30% deposit terms','Follow up with Jean-Paul on Paris HQ budget approval','Issue proforma invoice for USD 36,000'],
    audio:['Transcribe and send meeting summary to all attendees','Book follow-up call within 2 weeks','Prepare talking points for HQ sign-off call','Update CRM with Saint-Gobain contact details'],
    file: ['Review contract clauses flagged in section 4.2','Request legal review of exclusivity clause','Get finance sign-off on updated payment terms','Archive signed NDA in shared drive','Update delivery schedule in production tracker'],
    memo: ['Brief legal team on exclusivity risk','Verify quality certification docs are current','Schedule quarterly review with Saint-Gobain','Update CRM contact notes for Jean-Paul'],
  };
  const content = (document.getElementById('nc-content')||{}).value || '';
  let tasks = [];
  if (_MS.inputMethod==='paste' && content.length>30) {
    const rx=/\b(send|prepare|confirm|draft|follow|update|schedule|review|contact|book|get|issue|check|create|notify|discuss|request|share|complete|arrange)\b/i;
    tasks = content.split(/[.\n]/).map(l=>l.trim()).filter(l=>l.length>10&&rx.test(l)).slice(0,5).map(l=>l.charAt(0).toUpperCase()+l.slice(1));
  }
  if (!tasks.length) {
    const pool = _MS.type==='memo' ? [...taskPools.memo,...taskPools[_MS.inputMethod]] : (taskPools[_MS.inputMethod]||taskPools.paste);
    tasks = pool.slice(0, 3+Math.floor(Math.random()*2));
  }
  const msgs = _MS.inputMethod==='audio' ? ['Transcribing audio…','Identifying action items…','Structuring tasks…'] :
               _MS.inputMethod==='file'  ? ['Reading document…','Extracting content…','Identifying action items…'] :
                                           ['Analysing content…','Extracting action items…','Formatting tasks…'];
  let step=0;
  const hint = document.getElementById('ai-hint-area');
  if (hint) hint.innerHTML=`<div class="ai-processing"><span class="ai-spinner"></span><span id="ai-status-msg">${msgs[0]}</span></div>`;
  const iv = setInterval(()=>{
    step++;
    const el=document.getElementById('ai-status-msg');
    if(el&&step<msgs.length) el.textContent=msgs[step];
    if(step>=msgs.length){ clearInterval(iv); _MS.extractedTasks=tasks; _MS.step='review'; _renderContentModal(); }
  },900);
}

function quickExtract() {
  const content=(document.getElementById('nc-content')||{}).value||'';
  if(!content.trim()){toast('Paste some notes first for Quick Extract');return;}
  const rx=/\b(send|prepare|confirm|draft|follow|update|schedule|review|contact|book|get|issue|check|create|notify|discuss|request|share|complete|arrange)\b/i;
  const tasks=content.split(/[.\n]/).map(l=>l.trim()).filter(l=>l.length>8&&rx.test(l)).slice(0,6).map(l=>l.charAt(0).toUpperCase()+l.slice(1));
  if(!tasks.length){toast('No clear action items found — try Process with AI');return;}
  _MS.extractedTasks=tasks; _MS.step='review'; _renderContentModal();

function filterTagSuggestions(field, taggerId, inputId, dropdownId, val) {
  const dd = document.getElementById(dropdownId); if (!dd) return;
  const items = _MS[field] || [];
  const added = new Set(items.map(a => a.name.toLowerCase()));
  const isNotify = field === 'notifyMembers';
  const matches = ORG_MEMBERS.filter(m =>
    !added.has(m.name.toLowerCase()) &&
    (!val || m.name.toLowerCase().includes(val.toLowerCase()))
  );
  if (!val && !matches.length) { dd.classList.remove('show'); return; }
  const memberRows = matches.map(m =>
    `<div class="at-option" onclick="addTag('${field}','${taggerId}','${inputId}','${dropdownId}','${m.name}','${m.id}',true)">
      <div class="at-av" style="background:${m.color}22;color:${m.color}">${m.id}</div>
      <div>
        <div style="font-size:12.5px;font-weight:500">${m.name}</div>
        <div style="font-size:10.5px;color:var(--fg-muted)">${m.role} · Registered</div>
      </div>
    </div>`
  ).join('');
  const alreadyInOrg = ORG_MEMBERS.some(m => m.name.toLowerCase() === (val||'').toLowerCase());
  const extRow = !isNotify && val && !alreadyInOrg && !added.has(val.toLowerCase())
    ? `<div class="at-option at-option-ext" onclick="addTag('${field}','${taggerId}','${inputId}','${dropdownId}','${val}','',false)">＋ Add "<b>${val}</b>" as external attendee</div>` : '';
  dd.innerHTML = memberRows + extRow;
  dd.classList.toggle('show', !!(memberRows || extRow));
}

function handleTagKey(field, taggerId, inputId, dropdownId, e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.trim().replace(/,$/, '');
    if (val) addTag(field, taggerId, inputId, dropdownId, val, '', false);
    else { const dd=document.getElementById(dropdownId); if(dd) dd.classList.remove('show'); }
  } else if (e.key === 'Backspace' && !e.target.value && (_MS[field]||[]).length) {
    removeTag(field, taggerId, inputId, dropdownId, (_MS[field]).length - 1);
  } else if (e.key === 'Escape') {
    const dd=document.getElementById(dropdownId); if(dd) dd.classList.remove('show');
  }
}

function addTag(field, taggerId, inputId, dropdownId, name, id, registered) {
  name = name.trim(); if (!name) return;
  if (!_MS[field]) _MS[field] = [];
  if (_MS[field].find(a => a.name.toLowerCase() === name.toLowerCase())) {
    toast(`${name} is already added`); return;
  }
  _MS[field].push({ name, id: id||'', registered: !!registered });
  _refreshTaggerEl(field, taggerId, inputId, dropdownId);
}

function removeTag(field, taggerId, inputId, dropdownId, idx) {
  if (_MS[field]) _MS[field].splice(idx, 1);
  _refreshTaggerEl(field, taggerId, inputId, dropdownId);
  filterTagSuggestions(field, taggerId, inputId, dropdownId, '');
}

function _refreshTaggerEl(field, taggerId, inputId, dropdownId) {
  const tagger = document.getElementById(taggerId); if (!tagger) return;
  const items = _MS[field] || [];
  const isNotify = field === 'notifyMembers';
  const chips = items.map((a,i) =>
    `<span class="at-chip ${a.registered?'registered':''}">${a.name}<button class="at-chip-del" onclick="removeTag('${field}','${taggerId}','${inputId}','${dropdownId}',${i})">✕</button></span>`
  ).join('');
  const placeholder = items.length ? 'Add more…' : (isNotify ? 'Tag team members to notify…' : 'Add attendees…');
  tagger.innerHTML = chips + `<input class="at-input" id="${inputId}"
    placeholder="${placeholder}"
    oninput="filterTagSuggestions('${field}','${taggerId}','${inputId}','${dropdownId}',this.value)"
    onkeydown="handleTagKey('${field}','${taggerId}','${inputId}','${dropdownId}',event)"
    autocomplete="off">`;
  const inp = document.getElementById(inputId); if (inp) inp.focus();
  const dd = document.getElementById(dropdownId); if (dd) { dd.innerHTML=''; dd.classList.remove('show'); }
}

function saveNewContent() {
  const title=((document.getElementById('nc-title')||{}).value||'').trim() || (_MS.type==='meeting'?'Untitled Meeting':'Untitled Memo');
  const today=new Date().toISOString().split('T')[0];

  const storyId=_MS.storyId;
  if(_MS.type==='meeting'){
    const date=((document.getElementById('nc-date')||{}).value)||today;
    const att=_MS.attendees.length ? _MS.attendees.map(a=>a.name) : ['Rey Putra'];
    const notes=((document.getElementById('nc-content')||{}).value)||'';
    const id=uid('m');
    const taskIds=tasks.map(t=>{const tid=uid('t');DB.tasks[tid]={id:tid,title:t,status:'open',assignee:'R',meetingId:id,source:'meeting'};return tid;});
    DB.meetings[id]={id,storyId,title,date,attendees:att,notes,mom:'',taskIds,aiSummary:''};
    closeModal();
    toast(`Meeting "${title}" created${tasks.length?' + '+tasks.length+' tasks':''}`)
    S.storyId=storyId; S.storyTab='timeline'; S.expandedMeetings.add(id);

    DB.memos[id]={id,storyId,title,date:today,body,notifyMembers:notified,taskIds:[],aiSummary:''};

    if(S.view==='story'&&S.storyId===storyId) renderStoryMain(); else goStory(S.projectId,storyId);

}
