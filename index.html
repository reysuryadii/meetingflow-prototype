// ==================== STORY VIEW ====================
function renderStory() {
  const story = DB.stories[S.storyId];
  if (!story) { document.getElementById('main').innerHTML = '<div style="padding:40px;color:var(--fg-muted)">Story not found</div>'; return; }
  const proj = DB.projects[story.projectId];
  const statusMap = {
    open:        {label:'Open',        color:'var(--accent)',   bg:'var(--accent-soft)'},
    in_progress: {label:'In Progress', color:'#b45309',         bg:'var(--warn-soft)'},
    overdue:     {label:'Overdue',     color:'var(--danger)',   bg:'var(--danger-soft)'},
    done:        {label:'Completed',   color:'var(--success)',  bg:'var(--success-soft)'},
  };
  const _storyTasks = getStoryTasks(S.storyId);
  const _today = new Date().toISOString().split('T')[0];
  const _derivedStatus = (() => {
    if (!_storyTasks.length) return 'open';
    if (_storyTasks.every(t => t.status === 'done')) return 'done';
    if (story.dueDate && story.dueDate < _today) return 'overdue';
    return 'in_progress';
  })();
  const st = statusMap[_derivedStatus];
  const meetings = Object.values(DB.meetings).filter(m => m.storyId === S.storyId);
  const allTasks = getStoryTasks(S.storyId);
  const voiceCount = Object.values(DB.voices).filter(v=>v.storyId===S.storyId).length;
  const memoCount = Object.values(DB.memos).filter(m=>m.storyId===S.storyId).length;
  const tabCount = {
    timeline: meetings.length + memoCount,
    files: DB.files.filter(f=>f.storyId===S.storyId).length + voiceCount,
    tasks: allTasks.length,
  };
  const isTasksTab = S.storyTab === 'tasks';
  const hasSummary = !!story.aiSummary;
  const isCollapsed = story.summaryCollapsed;

  document.getElementById('main').innerHTML = `
    <div class="story-wrap">
      <div class="topbar" id="story-topbar">
        <div class="breadcrumb">
          <span class="crumb" onclick="goProject('${proj?.id||S.projectId}')">
            <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${proj?.color||'#6366f1'};margin-right:3px;vertical-align:middle"></span>
            ${proj?.name||'Project'}
          </span>
          <span class="crumb-sep">/</span>
          <span class="badge" style="background:rgba(79,70,229,.08);color:var(--accent)">📋 Story</span>
        </div>
        <div class="story-title-row">
          <div class="story-title">${story.name}</div>
          <span class="status-pill" style="background:${st.bg};color:${st.color}">${st.label}</span>
        </div>
        <div class="story-meta">
          ${story.dueDate ? `<span class="meta-chip">📅 Due ${story.dueDate}</span>` : ''}
        </div>
        <div class="tabs">
          <button class="tab ${S.storyTab==='timeline'?'active':''}" data-tab="timeline" onclick="setStoryTab('timeline')">🗓 Activity <span class="tab-badge">${tabCount.timeline}</span></button>
          <button class="tab ${S.storyTab==='files'?'active':''}" data-tab="files" onclick="setStoryTab('files')">📎 Files <span class="tab-badge">${tabCount.files}</span></button>
          <button class="tab ${S.storyTab==='tasks'?'active':''}" data-tab="tasks" onclick="setStoryTab('tasks')">✅ Tasks <span class="tab-badge">${tabCount.tasks}</span></button>
        </div>
      </div>
      <div style="flex:1;overflow:${isTasksTab?'hidden':'auto'};display:flex;flex-direction:column">
        <div id="story-tab-body" class="tab-body" style="flex:1;overflow:${isTasksTab?'hidden':'visible'};padding:${isTasksTab?'0 20px 16px':'0 20px 40px'};display:${isTasksTab?'flex':'block'};flex-direction:column"></div>
      </div>
    </div>`;
  renderStoryMain();
}

function renderStoryMain() {
  const el = document.getElementById('story-tab-body');
  if (!el) return;
  if (S.storyTab === 'timeline') el.innerHTML = renderTimelineTab();
  else if (S.storyTab === 'files' || S.storyTab === 'voice') el.innerHTML = renderFilesTab();
  else if (S.storyTab === 'tasks') el.innerHTML = renderTasksKanban();
}

function renderStoryAISummaryHTML(storyId) {
  const story = DB.stories[storyId];
  if (!story) return '';
  const collapsed = story.summaryCollapsed;
  if (!story.aiSummary) {
    return `<div class="story-ai-summary collapsed">
      <div class="sas-header" onclick="generateStoryAISummary('${storyId}')">
        <span class="sas-icon">✨</span>
        <span class="sas-label">AI Story Summary</span>
        <div class="sas-actions">
          <button class="sas-gen-btn" onclick="event.stopPropagation();generateStoryAISummary('${storyId}')">✨ Generate Summary</button>
        </div>
      </div>
    </div>`;
  }
  return `<div class="story-ai-summary ${collapsed?'collapsed':''}">
    <div class="sas-header" onclick="toggleStorySummary('${storyId}')">
      <span class="sas-icon">✨</span>
      <span class="sas-label">AI Story Summary</span>
      <div class="sas-actions">
        <button class="sas-gen-btn" onclick="event.stopPropagation();generateStoryAISummary('${storyId}')">↺ Regenerate</button>
        <span class="sas-toggle">${collapsed ? '▾ Show' : '▴ Hide'}</span>
      </div>
    </div>
    ${collapsed ? '' : `<div class="sas-body">${story.aiSummary}</div>`}
  </div>`;
}

function toggleStorySummary(storyId) {
  const story = DB.stories[storyId];
  if (!story) return;
  story.summaryCollapsed = !story.summaryCollapsed;
  const wrap = document.getElementById('story-ai-summary-wrap');
  if (wrap) wrap.innerHTML = renderStoryAISummaryHTML(storyId);
}

function generateStoryAISummary(storyId) {
  const story = DB.stories[storyId];
  if (!story) return;
  const wrap = document.getElementById('story-ai-summary-wrap');
  if (wrap) wrap.innerHTML = `<div class="story-ai-summary" style="margin:0 20px 14px">
    <div class="sas-header">
      <span class="sas-icon">✨</span>
      <span class="sas-label">AI Story Summary</span>
    </div>
    <div class="sas-body" style="margin-top:10px">
      <span class="sas-generating">✨ Analyzing meetings and memos…</span>
    </div>
  </div>`;
  const meetings = Object.values(DB.meetings).filter(m => m.storyId === storyId);
  const memos = Object.values(DB.memos).filter(m => m.storyId === storyId);
  const tasks = getStoryTasks(storyId);
  const done = tasks.filter(t => t.status === 'done').length;
  setTimeout(() => {
    const summaries = [
      ...meetings.filter(m => m.aiSummary).map(m => m.aiSummary),
      ...memos.filter(m => m.body).map(m => m.title + ': ' + m.body.substring(0, 120)),
    ];
    const latestMtg = meetings.length ? meetings[meetings.length - 1] : null;
    const firstMtgSum = meetings.find(m => m.aiSummary)?.aiSummary || '';
    const firstMemSum = memos.find(m => m.aiSummary)?.aiSummary || '';
    const openTasks = tasks.filter(t => t.status !== 'done');
    const overdueTasks = openTasks.filter(t => t.dueDate && t.dueDate < new Date().toISOString().split('T')[0]);
    const leadSentence = firstMtgSum || firstMemSum || (meetings.length ? `${meetings.length} meeting${meetings.length!==1?'s':''} on record for this story.` : 'No meetings or memos yet.');
    story.aiSummary = `<p><span style="font-size:10px;background:var(--warn-soft);color:#92400e;padding:1px 6px;border-radius:3px;font-weight:600">⚠ Demo — wire real AI to generate live summaries</span></p><p>${leadSentence.substring(0, 220)}${leadSentence.length > 220 ? '…' : ''}</p><p><strong>At a glance:</strong> ${meetings.length} meeting${meetings.length!==1?'s':''} · ${memos.length} memo${memos.length!==1?'s':''} · ${tasks.length} task${tasks.length!==1?'s':''} (${done} done, ${openTasks.length} open${overdueTasks.length ? ', <span style="color:var(--danger)">' + overdueTasks.length + ' overdue</span>' : ''})${latestMtg ? ' · Latest: ' + latestMtg.title : ''}</p>`;
    story.summaryCollapsed = false;
    if (wrap) wrap.innerHTML = renderStoryAISummaryHTML(storyId);
    toast('✨ Story summary generated');
  }, 1600);
}

function renderTimelineTab() {
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const cf = S.contentFilter;

  const allMeetings = Object.values(DB.meetings).filter(m => m.storyId === S.storyId);
  const allMemos    = Object.values(DB.memos).filter(m => m.storyId === S.storyId);

  const items = [
    ...(cf !== 'memos'    ? allMeetings.map(m => ({...m, _type:'meeting'})) : []),
    ...(cf !== 'meetings' ? allMemos.map(m    => ({...m, _type:'memo'}))    : []),
  ].sort((a,b) => (a.date||'').localeCompare(b.date||''));

  const cards = items.map(item => item._type === 'meeting'
    ? renderMeetingCard(item)
    : renderMemoCard(item)
  ).join('');

  const filterBar = `<div style="display:flex;gap:5px;margin-bottom:14px">
    <button class="fchip ${cf==='all'?'active':''}" onclick="setContentFilter('all')">All <span style="opacity:.6">${allMeetings.length + allMemos.length}</span></button>
    <button class="fchip ${cf==='meetings'?'active':''}" onclick="setContentFilter('meetings')">🗓 Meetings <span style="opacity:.6">${allMeetings.length}</span></button>
    <button class="fchip ${cf==='memos'?'active':''}" onclick="setContentFilter('memos')">📝 Memos <span style="opacity:.6">${allMemos.length}</span></button>
  </div>`;

  const addRow = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
    <button class="add-mtg-btn" style="margin-bottom:0" onclick="showNewContentModal('${S.storyId}','meeting')">🗓 &nbsp;New Meeting</button>
    <button class="add-mtg-btn" style="margin-bottom:0;background:rgba(16,185,129,.06);border-color:rgba(16,185,129,.3);color:#065f46" onclick="showNewContentModal('${S.storyId}','memo')">📝 &nbsp;New Memo</button>
  </div>`;

  const summaryWrap = `<div id="story-ai-summary-wrap" style="margin-bottom:14px">${renderStoryAISummaryHTML(S.storyId)}</div>`;
  return summaryWrap + addRow + filterBar + (cards || '<div style="padding:30px;text-align:center;color:var(--fg-faint);font-size:13px">No activity yet</div>');
}

function renderMemoCard(m) {
  const isOpen = S.expandedMemos.has(m.id);
  const tasks = (m.taskIds||[]).map(id => DB.tasks[id]).filter(Boolean);
  const doneTasks = tasks.filter(t => t.status === 'done');
  const [y,mo,d] = (m.date||'2026-01-01').split('-');
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const month = monthNames[parseInt(mo)-1];

  const pillColor = tasks.length
    ? `background:var(--success-soft);color:var(--success)`
    : `background:var(--bg);color:var(--fg-faint);border:1px solid var(--border)`;
  const pillText = tasks.length ? `✅ ${tasks.length} tasks` : `0 tasks`;

  let bodyHtml = '';
  if (isOpen) {
    const _today = new Date().toISOString().split('T')[0];
    const colStyle = {
      open:'background:var(--accent-soft);color:var(--accent)',
      in_progress:'background:var(--warn-soft);color:#b45309',
      review:'background:rgba(124,58,237,.1);color:#7c3aed',
      done:'background:var(--success-soft);color:var(--success)',
    };
    const colLabel = {open:'Open',in_progress:'In Progress',review:'Review',done:'Done'};
    const taskRows = tasks.map(t => {
      const isOverdue = t.dueDate && t.dueDate < _today && t.status !== 'done';
      const prio = PRIO[t.priority];
      return `<div class="action-item" onclick="showTaskModal('${t.id}')">
        <div class="ai-title">${t.title}</div>
        ${prio ? `<span class="kcard-prio ${prio.cls}" style="font-size:10px;flex-shrink:0">${prio.label}</span>` : ''}
        ${t.dueDate ? `<span class="ai-due ${isOverdue?'overdue':''}" style="flex-shrink:0">${isOverdue?'⚠ ':''}${t.dueDate.slice(5).replace('-','/')}</span>` : ''}
        <span style="padding:1px 7px;border-radius:6px;font-size:10px;font-weight:600;flex-shrink:0;${colStyle[t.status]||colStyle.open}">${colLabel[t.status]||t.status}</span>
      </div>`;
    }).join('');

    bodyHtml = `<div class="mtg-body open">
      <div class="body-grid">
        ${m.aiSummary ? `<div>
          <div class="body-label">AI Summary</div>
          <div class="ai-summary-box" style="background:var(--accent-soft);border:1px solid rgba(79,70,229,.15);border-radius:var(--radius-sm);padding:10px 12px;font-size:12.5px;color:var(--fg);line-height:1.65">${m.aiSummary}</div>
        </div>` : `<div>
          <button class="btn-ghost" style="font-size:12px" onclick="generateMemoAI('${m.id}')">✨ Generate AI Summary + Tasks</button>
        </div>`}
        <div>
          <div class="body-label">Notes</div>
          <div class="notes-box">${(m.body||'').replace(/\n/g,'<br>')}</div>
        </div>
        ${tasks.length ? `<div>
          <div class="body-label">Action Items (${doneTasks.length}/${tasks.length} done)</div>
          <div>${taskRows}</div>
        </div>` : ''}
      </div>
    </div>`;
  } else {
    bodyHtml = `<div class="mtg-body"></div>`;
  }

  return `<div class="mtg-card" style="margin-bottom:10px">
    <div class="mtg-card-head" onclick="toggleMemoCard('${m.id}')">
      <div class="mtg-date-block"><div class="mtg-month">${month}</div><div class="mtg-day">${d}</div></div>
      <div class="mtg-info">
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#059669;background:var(--success-soft);padding:1px 6px;border-radius:5px;flex-shrink:0">Memo</span>
          <div class="mtg-title">${m.title}</div>
        </div>
        <div class="mtg-meta">
          ${m.aiSummary ? '<span style="color:var(--accent)">🤖 AI summary</span>' : ''}
          ${m.body ? `<span style="color:var(--fg-faint);font-size:11px">${m.body.slice(0,60)}…</span>` : ''}
        </div>
      </div>
      <div class="mtg-right">
        <span class="tasks-pill" style="${pillColor}">${pillText}</span>
        <button class="expand-ico ${isOpen?'open':''}" onclick="event.stopPropagation();toggleMemoCard('${m.id}')">▲</button>
      </div>
    </div>
    ${bodyHtml}
  </div>`;
}

function toggleMemoCard(memoId) {
  if (S.expandedMemos.has(memoId)) S.expandedMemos.delete(memoId);
  else S.expandedMemos.add(memoId);
  renderStoryMain();
}

function generateMemoAI(memoId) {
  const m = DB.memos[memoId];
  if (!m) return;
  S.expandedMemos.add(memoId);
  renderStoryMain();
  setTimeout(() => {
    if (!m.aiSummary) {
      m.aiSummary = m.body ? m.body.split('.').slice(0,2).join('.') + '.' : 'Key insights extracted from this memo.';
    }
    if (!m.taskIds || !m.taskIds.length) {
      const id1 = uid('t'), id2 = uid('t');
      DB.tasks[id1] = {id:id1,title:'Follow up on: ' + m.title,status:'open',priority:'medium',dueDate:'',assignee:'R',memoId,storyId:m.storyId,source:'memo',attachments:[],comments:[]};
      m.taskIds = [id1];
    }
    renderStoryMain();
    toast('✨ AI summary and tasks generated');
  }, 1400);
}

function renderMeetingCard(m) {
    const [y,mo,d] = m.date.split('-');
    const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const month = monthNames[parseInt(mo)-1];

    if (isOpen) {
      const _today = new Date().toISOString().split('T')[0];
      const colStyle = {
        open:'background:var(--accent-soft);color:var(--accent)',
        in_progress:'background:var(--warn-soft);color:#b45309',

      };

        const isOverdue = t.dueDate && t.dueDate < _today && t.status !== 'done';

          <span style="padding:1px 7px;border-radius:6px;font-size:10px;font-weight:600;flex-shrink:0;${colStyle[t.status]||colStyle.open}">${colLabel[t.status]||t.status}</span>
        </div>`;
      }).join('');
      const momContent = m.mom || (m.notes ? `<div class="mom-block"><div class="mom-heading">📋 Notes</div><p style="color:var(--fg);font-size:13px;line-height:1.65;margin:0">${m.notes.replace(/\n/g,'<br>')}</p></div>` : '');

      bodyHtml = `<div class="mtg-body"></div>`;

    const pillColor = isUpcoming ? 'background:var(--accent-soft);color:var(--accent)' : 'background:var(--success-soft);color:var(--success)';

        </div>
      </div>
      ${bodyHtml}
    </div>`;
}

  const files = DB.files.filter(f => f.storyId === S.storyId);
  const heights = [4,9,16,22,28,20,13,8,5,12,24,30,18,11,7,17,26,22,14,8,5,13,20,16,10,6,4,9,18,28,21,14];

// ==================== KANBAN ====================
const PRIO = {
  urgent: {label:'Urgent', cls:'prio-urgent'},
  high:   {label:'High',   cls:'prio-high'},
  medium: {label:'Medium', cls:'prio-medium'},
  low:    {label:'Low',    cls:'prio-low'},
};
const COL_STATUS = {
  open:        {label:'Open',        color:'var(--accent)'},
  in_progress: {label:'In Progress', color:'#b45309'},
  review:      {label:'Review',      color:'#7c3aed'},
  done:        {label:'Done',        color:'var(--success)'},
};

const STAGE_ORDER = ['open','in_progress','review','done'];

function renderTasksKanban() {
  const tasks = getStoryTasks(S.storyId);
  const today = new Date().toISOString().split('T')[0];
  const cols = Object.entries(COL_STATUS).map(([key, col]) => {
    const colTasks = tasks.filter(t => t.status === key);
    const cards = colTasks.map(t => {
      const isOverdue = t.dueDate && t.dueDate < today && key !== 'done';
      const prio = PRIO[t.priority];
      const mem = ORG_MEMBERS.find(m => m.id === t.assignee);
      return `<div class="kanban-card" draggable="true"
        ondragstart="kanbanDragStart(event,'${t.id}')"
        ondragend="kanbanDragEnd(event)"
        onclick="showTaskModal('${t.id}')">
        <div class="kcard-title">${t.title}</div>
        ${t.description ? `<div class="kcard-desc">${t.description}</div>` : ''}
        <div class="kcard-footer">
          ${prio ? `<span class="kcard-prio ${prio.cls}">${prio.label}</span>` : ''}
          ${t.dueDate ? `<span class="kcard-due ${isOverdue?'overdue':''}">${isOverdue?'⚠ ':''}${t.dueDate.slice(5).replace('-','/')}</span>` : ''}
          ${t.comments?.length ? `<span style="font-size:10px;color:var(--fg-muted)">💬 ${t.comments.length}</span>` : ''}
          ${mem ? `<div class="kcard-av" style="background:${mem.color}22;color:${mem.color}">${mem.id}</div>` : ''}
        </div>
      </div>`;
    }).join('');
    return `<div class="kanban-col">
      <div class="kc-head">
        <span class="kc-label" style="color:${col.color}">${col.label}</span>
        <span class="kc-count">${colTasks.length}</span>
      </div>
      <div class="kc-body" data-status="${key}"
        ondragover="kanbanDragOver(event)"
        ondragleave="kanbanDragLeave(event)"
        ondrop="kanbanDrop(event,'${key}')">
        ${cards || `<div style="font-size:11.5px;color:var(--fg-faint);text-align:center;padding:20px 0">Drop here</div>`}
      </div>
      ${key === 'open' ? `<button class="kc-add" onclick="showNewTaskModal('open')">＋ Create</button>` : ''}
    </div>`;
  }).join('');
  return `<div class="kanban-board">${cols}</div>`;
}

let _dragTaskId = null;

function kanbanDragStart(e, taskId) {
  _dragTaskId = taskId;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function kanbanDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.kc-body').forEach(el => el.classList.remove('drag-over'));
}

function kanbanDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}

function kanbanDragLeave(e) {
  if (!e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove('drag-over');
  }
}

function kanbanDrop(e, targetStatus) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!_dragTaskId) return;
  const t = DB.tasks[_dragTaskId];
  if (!t || t.status === targetStatus) return;

  const fromIdx = STAGE_ORDER.indexOf(t.status);
  const toIdx   = STAGE_ORDER.indexOf(targetStatus);

  if (toIdx !== fromIdx + 1) {
    const msg = toIdx < fromIdx
      ? 'Tasks cannot move backwards.'
      : `Cannot skip stages — move to "${COL_STATUS[STAGE_ORDER[fromIdx+1]].label}" first.`;
    toast('⚠ ' + msg);
    return;
  }

  if (targetStatus === 'done') {
    showCompletionForm(_dragTaskId);
  } else {
    t.status = targetStatus;
    if (S.view === 'myboard') renderMyBoard(); else renderStoryMain();
    toast(`Moved to ${COL_STATUS[targetStatus].label}`);
  }
  _dragTaskId = null;
}

function cfToggleInput(type) {
  if (_CF.activeInputs.has(type)) {
    if (_CF.activeInputs.size === 1) return;
    _CF.activeInputs.delete(type);
  } else {
    _CF.activeInputs.add(type);
  }
  document.querySelectorAll('.cf-tab').forEach(btn => {
    btn.classList.toggle('active', _CF.activeInputs.has(btn.dataset.input));
  });
  cfRenderInputs();
}

function cfRenderInputs() {
  const wrap = document.getElementById('cf-inputs-wrap');
  if (!wrap) return;
  let html = '';

  if (_CF.activeInputs.has('notes')) {
    html += `<div>
      <div class="cf-label">Notes / Paste</div>
      <textarea class="cf-textarea" id="cf-notes" placeholder="Describe what was done, key outcomes, decisions made, blockers resolved…">${document.getElementById('cf-notes')?.value||''}</textarea>
    </div>`;
  }

  if (_CF.activeInputs.has('record')) {
    if (_CF.recording) {
      html += `<div class="cf-recording-chip">
        🎙 <span style="flex:1">${_CF.recording}</span>
        <button style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:13px" onclick="cfRemoveRecording()">✕</button>
      </div>`;
    } else {
      html += `<div>
        <div class="cf-label">Recording</div>
        <button class="cf-record-btn ${_CF.isRecording?'recording':''}" id="cf-rec-btn" onclick="cfToggleRecord()">
          ${_CF.isRecording ? '⏹ Stop Recording' : '⏺ Start Recording'}
        </button>
        ${_CF.isRecording ? `<div style="font-size:11px;color:var(--danger);text-align:center;margin-top:6px;animation:rec-pulse 1.2s infinite">Recording… <span id="cf-rec-timer">0:00</span></div>` : ''}
      </div>`;
    }
  }

  if (_CF.activeInputs.has('files')) {
    const chips = _CF.attachments.map((f,i) => `
      <div class="cf-attachment">
        <span>${f.icon}</span><span>${f.name}</span>
        <button onclick="cfRemoveAttachment(${i})">✕</button>
      </div>`).join('');
    html += `<div>
      <div class="cf-label">Files & Images</div>
      <div class="cf-dropzone" onclick="cfFakeAttach()" ondragover="event.preventDefault();this.style.borderColor='var(--accent)'" ondragleave="this.style.borderColor=''" ondrop="event.preventDefault();cfFakeAttach()">
        <div style="font-size:22px;margin-bottom:4px">📎</div>
        Drop files or images here, or <span style="color:var(--accent);text-decoration:underline;cursor:pointer">browse</span>
        <div style="font-size:11px;margin-top:3px;opacity:.6">Docs, spreadsheets, images, PDFs</div>
      </div>
      ${chips ? `<div class="cf-attachments" style="margin-top:8px">${chips}</div>` : ''}
    </div>`;
  }

  wrap.innerHTML = html;
  if (_CF.activeInputs.has('notes') && !_CF.isRecording) {
    document.getElementById('cf-notes')?.focus();
  }
}

let _cfRecInterval = null;
let _cfRecSeconds = 0;

function cfToggleRecord() {
  if (_CF.isRecording) {
    clearInterval(_cfRecInterval);
    const mins = Math.floor(_cfRecSeconds/60);
    const secs = String(_cfRecSeconds%60).padStart(2,'0');
    _CF.recording = `Voice recording — ${mins}:${secs}`;
    _CF.isRecording = false;
    _cfRecSeconds = 0;
  } else {
    _CF.isRecording = true;
    _cfRecSeconds = 0;
    _cfRecInterval = setInterval(() => {
      _cfRecSeconds++;
      const el = document.getElementById('cf-rec-timer');
      if (el) el.textContent = Math.floor(_cfRecSeconds/60)+':'+String(_cfRecSeconds%60).padStart(2,'0');
    }, 1000);
  }
  cfRenderInputs();
}

function cfRemoveRecording() { _CF.recording = null; cfRenderInputs(); }

const CF_FILE_SAMPLES = [
  {icon:'📄', name:'completion_report.pdf'},
  {icon:'🖼', name:'screenshot_result.png'},
  {icon:'📊', name:'outcome_summary.xlsx'},
  {icon:'📝', name:'notes_doc.docx'},
];
function cfFakeAttach() {
  const sample = CF_FILE_SAMPLES[_CF.attachments.length % CF_FILE_SAMPLES.length];
  _CF.attachments.push(sample);
  cfRenderInputs();
}
function cfRemoveAttachment(i) { _CF.attachments.splice(i, 1); cfRenderInputs(); }

function closeCompletionForm() {
  clearInterval(_cfRecInterval);
  document.getElementById('cf-overlay')?.remove();
  _CF.taskId = null; _CF.isRecording = false;
}

function generateCompletionNote() {
  const notes = (document.getElementById('cf-notes')?.value || '').trim();
  const hasContent = notes || _CF.recording || _CF.attachments.length;
  const t = DB.tasks[_CF.taskId];
  if (!hasContent) { toast('Add at least one piece of evidence'); return; }
  const btn = document.getElementById('cf-ai-btn');
  btn.disabled = true; btn.textContent = '✨ Generating…';
  setTimeout(() => {
    const today = fmtDate(new Date().toISOString().split('T')[0]);
    const sources = [
      notes && `Notes: "${notes.substring(0,100)}${notes.length>100?'…':''}"`,
      _CF.recording && `Voice recording (${_CF.recording})`,
      _CF.attachments.length && `${_CF.attachments.length} attachment${_CF.attachments.length>1?'s':''}: ${_CF.attachments.map(f=>f.name).join(', ')}`,
    ].filter(Boolean);
    const lines = notes ? notes.split(/[.!\n]+/).map(s=>s.trim()).filter(s=>s.length>8) : [];
    const outcomes = lines.slice(0,3).map(l=>`<li>${l.replace(/^[-•]\s*/,'')}</li>`).join('') || `<li>${t.title} — completed successfully.</li>`;
    const note = `<h3>📌 What was done</h3><p>${notes||t.title}</p>
<h3>🎯 Key Outcomes</h3><ul>${outcomes}</ul>
<h3>📎 Evidence</h3><ul>${sources.map(s=>`<li>${s}</li>`).join('')}</ul>
<h3>🧠 Learnings</h3><ul><li>Closed on ${today} — see linked task for full context.</li></ul>
<h3>🔗 Linked to</h3><ul><li>${t.id?.toUpperCase()} · ${DB.stories[t.storyId]?.name||t.storyId}</li></ul>`;
    const wrap = document.getElementById('cf-result-wrap');
    const result = document.getElementById('cf-result');
    if (wrap) wrap.style.display = 'block';
    if (result) result.innerHTML = note;
    t._completionNote = note;
    btn.disabled = false; btn.textContent = '↺ Regenerate';
  }, 1300);
}

function submitCompletionForm() {
  const t = DB.tasks[_CF.taskId];
  if (!t) return;
  t.status = 'done';
  const notes = document.getElementById('cf-notes')?.value || '';
  if (!t._completionNote) t._completionNote = notes || t.title;
  closeCompletionForm();
  if (S.view === 'myboard') renderMyBoard(); else renderStoryMain();
  renderSidebar();
  toast('✅ Task marked done');
}

  const meetingIds = Object.values(DB.meetings).filter(m => m.storyId === storyId).map(m => m.id);

}

  }).join('');
}

// ==================== TASK MODAL ====================
const _TM = { taskId: null, isNew: false, meetingId: null, initStatus: 'open' };

function showTaskModal(taskId) {
  _TM.taskId = taskId; _TM.isNew = false;
  history.pushState(null, '', '#task/' + taskId);
  _renderTaskModal();
}

function showNewTaskModal(status, meetingId) {
  _TM.taskId = null; _TM.isNew = true;
  _TM.initStatus = status || 'open';
  _TM.meetingId = meetingId || null;
  _renderTaskModal();
}

function _renderTaskModal() {
  const t = _TM.isNew ? null : DB.tasks[_TM.taskId];
  const today = new Date().toISOString().split('T')[0];

  const statusOpts = Object.entries(COL_STATUS).map(([k,v]) =>
    `<option value="${k}" ${(t?.status||_TM.initStatus)===k?'selected':''}>${v.label}</option>`).join('');
  const prioOpts = ['urgent','high','medium','low'].map(k =>
    `<option value="${k}" ${(t?.priority||'medium')===k?'selected':''}>${PRIO[k].label}</option>`).join('');
  const assignOpts = ORG_MEMBERS.map(m =>
    `<option value="${m.id}" ${(t?.assignee||'R')===m.id?'selected':''}>${m.name}</option>`).join('');

  const comments = (t?.comments||[]).map(c => {
    const mem = ORG_MEMBERS.find(m => m.id === c.authorId);
    return `<div class="comment">
      <div class="comment-av" style="background:${mem?.color||'#6366f1'}22;color:${mem?.color||'#6366f1'}">${c.authorId}</div>
      <div class="comment-body">
        <div class="comment-meta"><b>${c.author}</b> · ${c.date}</div>
        <div class="comment-text">${c.text}</div>
      </div>
    </div>`;
  }).join('');

  const attachList = (t?.attachments||[]).map(a =>
    `<div style="display:flex;align-items:center;gap:6px;font-size:12px;padding:5px 8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:4px">
      <span>📎</span><span style="flex:1">${a}</span>
    </div>`).join('');

  const html = `<div class="task-modal-overlay" id="task-modal-overlay" onclick="if(event.target===this)closeTaskModal()">
    <div class="task-modal">
      <div class="tm-header">
        <div style="flex:1;min-width:0">
          ${!_TM.isNew ? `<span class="tm-task-id" onclick="copyTaskLink()" title="Click to copy link">#${_TM.taskId?.toUpperCase()}</span>` : ''}
          <input class="tm-title-input" id="tm-title" placeholder="Task title…" value="${t?.title||''}">
        </div>
        <button class="tm-close" onclick="closeTaskModal()">✕</button>
      </div>
      <div class="tm-body">
        <div class="tm-main">
          <div>
            <div class="tm-field-label">Description</div>
            <textarea class="tm-desc" id="tm-desc" placeholder="Add more detail…">${t?.description||''}</textarea>
          </div>
          <div>
            <div class="tm-field-label">Attachments</div>
            <div id="tm-attach-list">${attachList}</div>
            <div class="tm-attach-zone" onclick="toast('📎 File picker — coming in deploy')">＋ Attach file, image, or document</div>
          </div>
          <hr class="tm-divider">
          <div>
            <div class="activity-label">Activity</div>
            <div id="tm-comments">${comments||'<div style="font-size:12px;color:var(--fg-faint);margin-bottom:12px">No comments yet.</div>'}</div>
            <div class="comment-input-row">
              <div class="comment-av" style="background:rgba(99,102,241,.12);color:var(--accent);width:26px;height:26px;border-radius:50%;font-size:11px;font-weight:700;display:grid;place-items:center;flex-shrink:0">R</div>
              <textarea class="comment-input" id="tm-comment-input" placeholder="Add a comment…" rows="1"
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitTaskComment()}"></textarea>
              <button class="tm-save" onclick="submitTaskComment()" style="align-self:flex-end">Send</button>
            </div>
          </div>
        </div>
        <div class="tm-sidebar">
          <div>
            <div class="tm-field-label">Status</div>
            <select class="tm-select" id="tm-status">${statusOpts}</select>
          </div>
          <div>
            <div class="tm-field-label">Priority</div>
            <select class="tm-select" id="tm-priority">${prioOpts}</select>
          </div>
          <div>
            <div class="tm-field-label">Assignee</div>
            <select class="tm-select" id="tm-assignee">${assignOpts}</select>
          </div>
          <div>
            <div class="tm-field-label">Due Date</div>
            <input class="tm-date-input" id="tm-due" type="date" value="${t?.dueDate||''}">
          </div>
          <hr class="tm-divider" style="margin:4px -14px">
          <button class="tm-save" style="width:100%;text-align:center" onclick="saveTaskModal()">${_TM.isNew ? 'Create Task' : 'Save Changes'}</button>
          ${!_TM.isNew ? `<button onclick="deleteTask('${t?.id}');closeTaskModal()" style="width:100%;border:none;background:none;color:var(--danger);font-size:12px;cursor:pointer;padding:4px;font-family:inherit">Delete task</button>` : ''}
        </div>
      </div>
    </div>
  </div>`;

  document.body.insertAdjacentHTML('beforeend', html);
  setTimeout(() => document.getElementById('tm-title')?.focus(), 60);

function closeTaskModal() {
  document.getElementById('task-modal-overlay')?.remove();
  history.pushState(null, '', window.location.pathname);
}

function copyTaskLink() {
  navigator.clipboard.writeText(window.location.href)
    .then(() => toast('🔗 Link copied to clipboard'))
    .catch(() => toast('Copy: ' + window.location.href));
}

window.addEventListener('hashchange', () => {
  const m = location.hash.match(/^#task\/(.+)$/);
  if (m && DB.tasks[m[1]]) showTaskModal(m[1]);
});
// Open task from URL on load
(function() {
  const m = location.hash.match(/^#task\/(.+)$/);
  if (m && DB.tasks[m[1]]) setTimeout(() => showTaskModal(m[1]), 200);
})();

function saveTaskModal() {
  const title = (document.getElementById('tm-title')?.value||'').trim();
  if (!title) { toast('Task title is required'); return; }
  const desc    = document.getElementById('tm-desc')?.value||'';
  const status  = document.getElementById('tm-status')?.value||'open';
  const priority= document.getElementById('tm-priority')?.value||'medium';
  const assignee= document.getElementById('tm-assignee')?.value||'R';
  const dueDate = document.getElementById('tm-due')?.value||'';

  if (_TM.isNew) {
    const id = uid('t');
    const storyId = S.storyId;
    const meetingId = _TM.meetingId||null;
    DB.tasks[id] = {id, title, description:desc, status, priority, dueDate, assignee,
      meetingId, storyId, source: meetingId ? 'meeting' : 'general', attachments:[], comments:[]};
    if (meetingId && DB.meetings[meetingId]) DB.meetings[meetingId].taskIds.push(id);
    toast(`Task "${title}" created`);
  } else {
    const t = DB.tasks[_TM.taskId];
    if (t) Object.assign(t, {title, description:desc, status, priority, dueDate, assignee});
    toast('Task updated');
  }
  closeTaskModal();
  if (S.view === 'story' && S.storyTab === 'tasks') renderStoryMain();
  else if (S.view === 'meeting') renderMeetingTaskList();
  renderSidebar();
}

function submitTaskComment() {
  const input = document.getElementById('tm-comment-input');
  const text = (input?.value||'').trim();
  if (!text) return;
  if (_TM.isNew) { toast('Save the task first before commenting'); return; }
  const t = DB.tasks[_TM.taskId];
  if (!t) return;
  if (!t.comments) t.comments = [];
  const id = uid('c');
  t.comments.push({id, authorId:'R', author:'Rey Putra', text, date:'Just now'});
  const box = document.getElementById('tm-comments');
  if (box) {
    box.innerHTML += `<div class="comment">
      <div class="comment-av" style="background:rgba(99,102,241,.12);color:var(--accent)">R</div>
      <div class="comment-body">
        <div class="comment-meta"><b>Rey Putra</b> · Just now</div>
        <div class="comment-text">${text}</div>
      </div>
    </div>`;
    box.scrollTop = box.scrollHeight;
  }
  input.value = '';
  toast('Comment added');
}

function deleteTask(taskId) {
  const t = DB.tasks[taskId];
  if (!t) return;
  if (t.meetingId && DB.meetings[t.meetingId]) {
    DB.meetings[t.meetingId].taskIds = DB.meetings[t.meetingId].taskIds.filter(x => x !== taskId);
  }
  delete DB.tasks[taskId];
  toast('Task deleted');
}

// ==================== INBOX ====================
let _boardDD = null;
function toggleBoardDD(id, e) {
  e.stopPropagation();
  _boardDD = (_boardDD === id) ? null : id;
  document.querySelectorAll('.filter-panel').forEach(p => p.classList.toggle('open', p.dataset.dd === _boardDD));
}
document.addEventListener('click', () => {
  _boardDD = null;
  document.querySelectorAll('.filter-panel').forEach(p => p.classList.remove('open'));
});

function renderMyBoard() {
  const today   = new Date().toISOString().split('T')[0];
  const filter  = S.myBoardFilter;
  const srcType = S.myBoardSourceType;
  const search  = (S.myBoardSearch || '').toLowerCase();
  const allTasks = Object.values(DB.tasks);

  let filtered = allTasks;
  if (filter === 'assigned') filtered = filtered.filter(t => t.assignee === 'R');
  else if (filter === 'sent') filtered = filtered.filter(t => t.assignee && t.assignee !== 'R');
  if (srcType === 'meeting') filtered = filtered.filter(t => t.meetingId);
  else if (srcType === 'memo') filtered = filtered.filter(t => t.memoId);
  if (search) filtered = filtered.filter(t => {
    const story = t.storyId ? DB.stories[t.storyId] : null;
    return t.title.toLowerCase().includes(search) || (story && story.name.toLowerCase().includes(search));
  });

  const priority = S.myBoardPriority;
  if (priority !== 'all') filtered = filtered.filter(t => t.priority === priority);

  const cols = Object.entries(COL_STATUS).map(([key, col]) => {
    const colTasks = filtered.filter(t => t.status === key);
    const cards = colTasks.map(t => {
      const isOverdue = t.dueDate && t.dueDate < today && key !== 'done';
      const prio = PRIO[t.priority];
      const mem  = ORG_MEMBERS.find(m => m.id === t.assignee);
      const story = t.storyId ? DB.stories[t.storyId] : null;
      const proj  = story ? DB.projects[story.projectId] : null;
      return `<div class="kanban-card" draggable="true"
        ondragstart="kanbanDragStart(event,'${t.id}')"
        ondragend="kanbanDragEnd(event)"
        onclick="showTaskModal('${t.id}')">
        <div class="kcard-title">${t.title}</div>
        ${story ? `<div style="font-size:10.5px;color:var(--fg-muted);margin-bottom:4px;display:flex;align-items:center;gap:4px">${proj?`<span style="width:6px;height:6px;border-radius:50%;background:${proj.color};flex-shrink:0;display:inline-block"></span>`:''}<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${story.name}</span></div>` : ''}
        <div class="kcard-footer">
          ${prio ? `<span class="kcard-prio ${prio.cls}">${prio.label}</span>` : ''}
          ${t.dueDate ? `<span class="kcard-due ${isOverdue?'overdue':''}">${isOverdue?'⚠ ':''}${t.dueDate.slice(5).replace('-','/')}</span>` : ''}
          ${mem ? `<div class="kcard-av" style="background:${mem.color}22;color:${mem.color}">${mem.id}</div>` : ''}
        </div>
      </div>`;
    }).join('');
    return `<div class="kanban-col">
      <div class="kc-head">
        <span class="kc-label" style="color:${col.color}">${col.label}</span>
        <span class="kc-count">${colTasks.length}</span>
      </div>
      <div class="kc-body" data-status="${key}"
        ondragover="kanbanDragOver(event)"
        ondragleave="kanbanDragLeave(event)"
        ondrop="kanbanDrop(event,'${key}')">
        ${cards || `<div style="font-size:11.5px;color:var(--fg-faint);text-align:center;padding:24px 0">No tasks</div>`}
      </div>
      ${key === 'open' ? `<button class="kc-add" onclick="showNewBoardTaskModal()">＋ Create</button>` : ''}
    </div>`;
  }).join('');

  // Label helpers
  const srcLabel   = srcType==='meeting'?'🗓 Meetings':srcType==='memo'?'📝 Memos':'Source Type';
  const qfLabel    = filter==='assigned'?'📥 Assigned to me':filter==='sent'?'📤 Sent by me':'Quick filters';
  const prioLabel  = priority==='urgent'?'🔴 Urgent':priority==='high'?'🟠 High':priority==='medium'?'🟡 Medium':priority==='low'?'🟢 Low':'Priority';
  const chevron    = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none" style="opacity:.6"><path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  const fpiRow = (val, label, cur, key) =>
    `<div class="fpi ${cur===val?'sel':''}" onclick="S.${key}=S.${key}===${JSON.stringify(val)}?'all':${JSON.stringify(val)};_boardDD=null;renderMyBoard()">
      <span class="fpi-check">${cur===val?'✓':''}</span>${label}</div>`;

  document.getElementById('main').innerHTML = `
    <div class="inbox-wrap">
      <div class="inbox-head" style="padding:16px 22px 0">
        <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:12px">
          <div class="inbox-title">My Board</div>
          <span style="font-size:12px;color:var(--fg-muted)">${filtered.filter(t=>t.status!=='done').length} open · ${filtered.length} total</span>
        </div>
        <div class="board-filters">
          <div class="board-search">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.4" style="color:var(--fg-faint)"/><path d="M9.5 9.5L12 12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" style="color:var(--fg-faint)"/></svg>
            <input placeholder="Search projects, meetings, memos &amp; tasks" value="${S.myBoardSearch||''}"
              oninput="S.myBoardSearch=this.value;renderMyBoard()" onclick="event.stopPropagation()">
          </div>
          <div class="filter-dropdown">
            <button class="filter-btn ${srcType!=='all'?'active':''}" onclick="toggleBoardDD('src',event)">
              ${srcLabel} ${chevron}
            </button>
            <div class="filter-panel" data-dd="src">
              ${fpiRow('all','All sources',srcType,'myBoardSourceType')}
              <div class="filter-sep"></div>
              ${fpiRow('meeting','🗓 Meetings',srcType,'myBoardSourceType')}
              ${fpiRow('memo','📝 Memos',srcType,'myBoardSourceType')}
            </div>
          </div>
          <div class="filter-dropdown">
            <button class="filter-btn ${priority!=='all'?'active':''}" onclick="toggleBoardDD('prio',event)">
              ${prioLabel} ${chevron}
            </button>
            <div class="filter-panel" data-dd="prio">
              ${fpiRow('all','All priorities',priority,'myBoardPriority')}
              <div class="filter-sep"></div>
              ${fpiRow('urgent','🔴 Urgent',priority,'myBoardPriority')}
              ${fpiRow('high','🟠 High',priority,'myBoardPriority')}
              ${fpiRow('medium','🟡 Medium',priority,'myBoardPriority')}
              ${fpiRow('low','🟢 Low',priority,'myBoardPriority')}
            </div>
          </div>
          <div class="filter-dropdown">
            <button class="filter-btn ${filter!=='all'?'active':''}" onclick="toggleBoardDD('qf',event)">
              ${qfLabel} ${chevron}
            </button>
            <div class="filter-panel" data-dd="qf">
              ${fpiRow('assigned','📥 Assigned to me',filter,'myBoardFilter')}
              ${fpiRow('sent','📤 Sent by me',filter,'myBoardFilter')}
            </div>
          </div>
        </div>
      </div>
      <div class="inbox-body" style="overflow-x:auto">
        <div class="kanban-board" style="min-width:fit-content">${cols}</div>
      </div>
    </div>`;
}

          <div>
            <div class="tm-field-label">Due Date</div>
            <input class="tm-date-input" id="nbt-due" type="date" value="${_NBT._due||''}" style="width:100%;box-sizing:border-box">
          </div>
        </div>

        <button class="tm-save" style="width:100%;text-align:center;padding:10px" onclick="saveNewBoardTask()">＋ Create Task</button>
      </div>
    </div>
  </div>`;

  document.body.insertAdjacentHTML('beforeend', html);
  setTimeout(() => document.getElementById('nbt-title')?.focus(), 60);
}

function saveNewBoardTask() {
  _nbtCapture();
  const title = _NBT._title.trim();
  if (!title) { toast('⚠ Task title is required'); return; }

  const lt = _NBT.linkType;
  let storyId   = document.getElementById('nbt-story')?.value || _NBT.storyId;
  let meetingId = null;
  let memoId    = null;
  let source    = 'general';

  if (lt === 'meeting' && _NBT.sourceId) {
    const mtg = DB.meetings[_NBT.sourceId];
    if (mtg) { storyId = mtg.storyId; meetingId = _NBT.sourceId; source = 'meeting'; }
  } else if (lt === 'memo' && _NBT.sourceId) {
    const mem = DB.memos[_NBT.sourceId];
    if (mem) { storyId = mem.storyId; memoId = _NBT.sourceId; source = 'memo'; }
  }

  if (!storyId) { toast('⚠ Please select a Story'); return; }

  const id = uid('t');
  DB.tasks[id] = { id, title, description:'', status:'open', priority:_NBT._priority||'medium',
    dueDate:_NBT._due||'', assignee:_NBT._assignee||'R',
    storyId, meetingId:meetingId||null, memoId:memoId||null, source, attachments:[], comments:[] };

  if (meetingId && DB.meetings[meetingId]) DB.meetings[meetingId].taskIds.push(id);
  if (memoId    && DB.memos[memoId])       DB.memos[memoId].taskIds.push(id);

  document.getElementById('nbt-overlay').remove();
  renderMyBoard();
  renderSidebar();
  toast(`✅ "${title}" created`);
}

function renderInbox() {
  const _todI = new Date().toISOString().split('T')[0];
  const myTasks = Object.values(DB.tasks).filter(t => t.assignee === 'R');
  const open    = myTasks.filter(t => t.status !== 'done');
  const done    = myTasks.filter(t => t.status === 'done');
  const overdue = open.filter(t => t.dueDate && t.dueDate < _todI);

  const colStyleInbox = {
    open:        'background:var(--accent-soft);color:var(--accent)',
    in_progress: 'background:var(--warn-soft);color:#b45309',
    review:      'background:rgba(124,58,237,.1);color:#7c3aed',
    done:        'background:var(--success-soft);color:var(--success)',
  };
  const colLabelInbox = {open:'Open', in_progress:'In Progress', review:'Review', done:'Done'};

  const taskRow = (t) => {
    const story = t.storyId ? DB.stories[t.storyId] : null;
    const proj  = story ? DB.projects[story.projectId] : null;
    const context = story ? story.name : '';
    const isOvd = t.dueDate && t.dueDate < _todI && t.status !== 'done';
    return `<div class="inbox-task" onclick="showTaskModal('${t.id}')">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:500;${t.status==='done'?'text-decoration:line-through;opacity:.5':''}">${t.title}</div>
        ${context ? `<div style="font-size:11px;color:var(--fg-muted);margin-top:2px">📋 ${context}${proj?' · '+proj.name:''}</div>` : ''}
        ${isOvd ? `<div style="font-size:10.5px;color:var(--danger);margin-top:2px;font-weight:600">⚠ Due ${t.dueDate}</div>` : (t.dueDate ? `<div style="font-size:10.5px;color:var(--fg-muted);margin-top:2px">📅 Due ${t.dueDate}</div>` : '')}
      </div>
      <span class="task-status" style="${colStyleInbox[t.status]||colStyleInbox.open}">${colLabelInbox[t.status]||t.status}</span>
    </div>`;
  };

  document.getElementById('main').innerHTML = `
    <div class="inbox-wrap">
      <div class="inbox-head">
        <div class="inbox-title">My Inbox</div>
        <div class="inbox-sub">${open.length} open · ${overdue.length} overdue · ${done.length} done</div>
      </div>
      <div class="inbox-body">
        ${overdue.length ? `<div class="inbox-group">
          <div class="inbox-group-label">⚠️ Overdue <span class="tg-count" style="background:var(--danger-soft);color:var(--danger)">${overdue.length}</span></div>
          ${overdue.map(taskRow).join('')}
        </div>` : ''}
        <div class="inbox-group">
          <div class="inbox-group-label">🔵 Open <span class="tg-count">${open.filter(t=>!(t.dueDate&&t.dueDate<_todI)).length}</span></div>
          ${open.filter(t=>!(t.dueDate&&t.dueDate<_todI)).map(taskRow).join('')}
        </div>
        ${done.length ? `<div class="inbox-group">
          <div class="inbox-group-label">✅ Done <span class="tg-count" style="background:var(--success-soft);color:var(--success)">${done.length}</span></div>
          ${done.map(taskRow).join('')}
        </div>` : ''}
      </div>
    </div>`;
}

// ==================== PROJECT VIEW ====================
function renderProject() {
  const proj = DB.projects[S.projectId];
  if (!proj) return;
  const stories = Object.values(DB.stories).filter(s => s.projectId === S.projectId);
  const storyIds = stories.map(s => s.id);
  const allMeetings = Object.values(DB.meetings).filter(m => storyIds.includes(m.storyId));
  const meetingIds = allMeetings.map(m => m.id);
  const allTasks = Object.values(DB.tasks).filter(t => meetingIds.includes(t.meetingId) || storyIds.includes(t.storyId));
  const _todP = new Date().toISOString().split('T')[0];
  const doneTasks = allTasks.filter(t => t.status === 'done');
  const overdueTasks = allTasks.filter(t => t.status !== 'done' && t.dueDate && t.dueDate < _todP);

  const statusMap = {
    in_progress:{label:'In Progress',color:'#b45309',bg:'var(--warn-soft)'},
    open:{label:'Open',color:'var(--accent)',bg:'var(--accent-soft)'},
    done:{label:'Done',color:'var(--success)',bg:'var(--success-soft)'}
  };

  const storyCard = (st) => {
    const st_status = statusMap[st.status] || statusMap.open;
    const mtgs = Object.values(DB.meetings).filter(m => m.storyId === st.id).sort((a,b) => a.date.localeCompare(b.date));
    const stTasks = Object.values(DB.tasks).filter(t => mtgs.map(m=>m.id).includes(t.meetingId) || t.storyId === st.id);
    const stDone = stTasks.filter(t => t.status === 'done').length;
    const pct = stTasks.length ? Math.round(stDone / stTasks.length * 100) : 0;
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    const mtgRows = mtgs.map(m => {
      const [y,mo,d] = m.date.split('-');
      const isUpcoming = new Date(m.date) > new Date();
      return `<div class="soc-mtg-row" onclick="event.stopPropagation();goMeeting('${m.id}')">
        <div class="soc-mtg-date">${d}</div>
        <span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.title}</span>
        <span style="font-size:10px;flex-shrink:0;color:${isUpcoming?'var(--accent)':'var(--fg-faint)'}">${months[parseInt(mo)-1]}${isUpcoming?' · upcoming':''}</span>
      </div>`;
    }).join('');

    return `<div class="story-overview-card" onclick="goStory('${proj.id}','${st.id}')">
      <div class="soc-head">
        <div class="soc-icon">📋</div>
        <div class="soc-info">
          <div class="soc-name">${st.name}</div>
          <div class="soc-meta">
            <span>🗓 ${mtgs.length} meeting${mtgs.length!==1?'s':''}</span>
            <span>✅ ${stTasks.length} tasks</span>
            ${st.dueDate ? `<span>📅 ${st.dueDate}</span>` : ''}
          </div>
        </div>
        <div class="soc-right">
          <span class="status-pill" style="background:${st_status.bg};color:${st_status.color}">${st_status.label}</span>
          <span style="font-size:12px;color:var(--fg-faint)">→</span>
        </div>
      </div>
      ${stTasks.length ? `<div class="soc-body">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--fg-muted)">
          <span>${stDone} of ${stTasks.length} tasks done</span>
          <span style="font-weight:600;color:var(--accent)">${pct}%</span>
        </div>
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
        ${mtgRows ? `<div class="soc-mtg-list">${mtgRows}</div>` : ''}
      </div>` : (mtgRows ? `<div class="soc-body"><div class="soc-mtg-list">${mtgRows}</div></div>` : '')}
    </div>`;
  };

  document.getElementById('main').innerHTML = `
    <div class="story-wrap">
      <div style="background:var(--bg-card);border-bottom:1px solid var(--border);padding:18px 22px;flex-shrink:0">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
          <div style="width:36px;height:36px;border-radius:9px;background:${proj.color};display:grid;place-items:center;color:white;font-size:16px;font-weight:800;flex-shrink:0">${proj.name[0]}</div>
          <div style="flex:1">
            <div style="font-size:19px;font-weight:700;letter-spacing:-.02em">${proj.name}</div>
            <div style="font-size:11.5px;color:var(--fg-muted);margin-top:1px">${stories.length} stories · ${allMeetings.length} meetings · ${allTasks.length} tasks</div>
          </div>
          <button class="btn-primary" onclick="showNewStoryModal('${proj.id}')">＋ New Story</button>
        </div>
        <div class="proj-stat-grid">
          <div class="proj-stat"><div class="proj-stat-val">${allTasks.length}</div><div class="proj-stat-lbl">Total tasks</div></div>
          <div class="proj-stat"><div class="proj-stat-val" style="color:var(--success)">${doneTasks.length}</div><div class="proj-stat-lbl">Done</div></div>
          <div class="proj-stat"><div class="proj-stat-val" style="color:var(--danger)">${overdueTasks.length}</div><div class="proj-stat-lbl">Overdue</div></div>
          <div class="proj-stat"><div class="proj-stat-val">${allMeetings.length}</div><div class="proj-stat-lbl">Meetings</div></div>
        </div>
      </div>
      <div style="flex:1;overflow-y:auto;padding:18px 22px 40px">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-faint);margin-bottom:10px">Stories</div>
        ${stories.length ? stories.map(storyCard).join('') : `<div style="padding:40px;text-align:center;color:var(--fg-muted);font-size:13px">No stories yet. <span style="color:var(--accent);cursor:pointer" onclick="showNewStoryModal('${proj.id}')">Create one →</span></div>`}
      </div>
    </div>`;
}

function showNewStoryModal(projectId) {
  document.getElementById('modal').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal-box">
        <div class="modal-title">New Story</div>
        <div class="modal-sub">Add a story to organise meetings and tasks</div>
        <div class="modal-field">
          <div class="modal-label">Story Name</div>
          <input class="modal-input" id="ns-name" placeholder="e.g. Vendor Negotiation" autofocus>
        </div>
        <div class="modal-field">
          <div class="modal-label">Status</div>
          <select class="modal-input" id="ns-status">
            <option value="open">Open</option>
            <option value="in_progress">In Progress</option>
            <option value="done">Done</option>
          </select>
        </div>
        <div class="modal-field">
          <div class="modal-label">Due Date (optional)</div>
          <input class="modal-input" type="date" id="ns-due">
        </div>
        <div class="modal-footer">
          <button class="btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn-primary" onclick="createStory('${projectId}')">Create Story</button>
        </div>
      </div>
    </div>`;
  setTimeout(() => document.getElementById('ns-name').focus(), 50);
}

function createStory(projectId) {
  const name   = document.getElementById('ns-name').value.trim() || 'Untitled Story';
  const status = document.getElementById('ns-status').value;
  const due    = document.getElementById('ns-due').value || '';
  const id = uid('story');
  DB.stories[id] = {id, projectId, name, status, dueDate: due, assignees:['Rey']};
  closeModal();
  toast(`Story "${name}" created`);
  S.expandedProjects[projectId] = true;
  renderSidebar();
  if (S.view === 'project' && S.projectId === projectId) renderProject();
}

// ==================== MAIN RENDER ====================
function renderSettings() {
  const card = 'background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden;margin-bottom:13px';
  document.getElementById('main').innerHTML = `
    <div style="flex:1;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden">
      <div style="background:var(--bg-card);border-bottom:1px solid var(--border);padding:13px 22px;position:sticky;top:0;z-index:10">
        <div style="font-size:19px;font-weight:700;letter-spacing:-.02em">⚙ Settings</div>
      </div>
      <div style="padding:18px 22px 55px">

        <h3 style="font-size:13px;font-weight:700;margin-bottom:9px;padding-bottom:6px;border-bottom:1px solid var(--border)">👤 Your Profile</h3>
        <div style="${card}">
          <div style="padding:13px 14px;display:flex;flex-direction:column;gap:10px">
            <div><label style="font-size:12px;color:var(--fg-muted);display:block;margin-bottom:3px">Display name</label>
              <input value="Reynerd Putra" style="max-width:280px;width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;font-size:13px;color:var(--fg);outline:none"></div>
            <div><label style="font-size:12px;color:var(--fg-muted);display:block;margin-bottom:3px">Email</label>
              <input value="reynerd.putra@astronauts.id" disabled style="max-width:280px;width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;font-size:13px;color:var(--fg-muted);outline:none;opacity:.7"></div>
            <div><label style="font-size:12px;color:var(--fg-muted);display:block;margin-bottom:3px">Role</label>
              <span style="font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:6px;background:#fef3c7;color:#92400e">owner</span></div>
            <button onclick="toast('✓ Profile saved')" style="width:fit-content;background:var(--accent);color:white;border:none;border-radius:var(--radius-sm);padding:6px 14px;font-size:12.5px;cursor:pointer">Save profile</button>
          </div>
        </div>

        <h3 style="font-size:13px;font-weight:700;margin-bottom:9px;padding-bottom:6px;border-bottom:1px solid var(--border)">🤖 AI Processing Mode</h3>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:13px">
          ${[
            {key:'paste', badge:'Free',        bc:'var(--success-soft)', fc:'var(--success)', title:'Prompt-paste', desc:'Copy prompt, paste JSON back.', sel:false},
            {key:'byo',   badge:'Recommended', bc:'var(--accent-soft)', fc:'var(--accent)',   title:'BYO API Key',  desc:'Direct Anthropic API call.',  sel:true},
            {key:'hosted',badge:'Unavailable', bc:'var(--bg)', fc:'var(--fg-muted)',           title:'Hosted LLM',   desc:'Included in paid plans.',     sel:false, off:true},
          ].map(m=>`
            <div onclick="${m.off?'':`toast('✓ ${m.title} selected')`}" style="background:${m.sel?'var(--accent-soft)':'var(--bg-card)'};border:2px solid ${m.sel?'var(--accent)':'var(--border)'};border-radius:var(--radius);padding:11px;cursor:${m.off?'default':'pointer'};opacity:${m.off?.5:1}">
              <span style="font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:4px;margin-bottom:5px;display:inline-block;background:${m.bc};color:${m.fc}">${m.badge}</span>
              <h4 style="font-size:12.5px;font-weight:700;margin:0 0 2px">${m.title}</h4>
              <p style="font-size:11px;color:var(--fg-muted);margin:0">${m.desc}</p>
            </div>`).join('')}
        </div>

        <h3 style="font-size:13px;font-weight:700;margin-bottom:9px;padding-bottom:6px;border-bottom:1px solid var(--border)">🔔 Notifications</h3>

          <div style="padding:0 13px">
            ${['Email on ticket assignment','Daily digest (06:00 local)','Stale ticket nudge','Self-ticket suppression'].map((label,i)=>`
            <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">

              <div onclick="this.dataset.on=this.dataset.on==='1'?'0':'1';this.style.background=this.dataset.on==='1'?'var(--accent)':'var(--border-strong)';this.querySelector('span').style.left=this.dataset.on==='1'?'18px':'3px'" data-on="${i<2?'1':'0'}" style="width:33px;height:18px;border-radius:10px;background:${i<2?'var(--accent)':'var(--border-strong)'};border:none;position:relative;cursor:pointer;flex-shrink:0">

          </div>
          <div style="padding:10px 13px">
            <button onclick="toast('✓ Preferences saved')" style="background:var(--accent);color:white;border:none;border-radius:var(--radius-sm);padding:6px 14px;font-size:12.5px;cursor:pointer">Save preferences</button>
            <p style="font-size:11px;color:var(--fg-muted);margin:6px 0 0">Email delivery is being wired — toggles have no effect on sending yet.</p>

        <h3 style="font-size:13px;font-weight:700;margin-bottom:9px;padding-bottom:6px;border-bottom:1px solid var(--border)">🏢 Organization</h3>

            <button onclick="toast('✓ Organization saved')" style="background:var(--accent);color:white;border:none;border-radius:var(--radius-sm);padding:6px 14px;font-size:12.5px;cursor:pointer">Save</button>
          </div>
          <div style="border-top:1px solid var(--border)">
            <div style="padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)">
              <span style="font-size:13px;font-weight:600">👥 Team Members</span>
              <span style="font-size:12px;color:var(--fg-muted)">1 member</span>
            </div>
            <div style="display:grid;grid-template-columns:34px 1fr 90px 72px;align-items:center;gap:8px;padding:10px 13px">
              <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#a855f7);color:white;font-size:11px;font-weight:700;display:grid;place-items:center">R</div>
              <div><div style="font-size:13px;font-weight:500">Reynerd Putra</div><div style="font-size:11px;color:var(--fg-muted)">reynerd.putra@astronauts.id</div></div>
              <span style="font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:6px;background:#fef3c7;color:#92400e">owner</span>
              <span style="font-size:11.5px;font-weight:600;color:var(--success)">Active</span>
            </div>
          </div>
        </div>

        <h3 style="font-size:13px;font-weight:700;margin-bottom:9px;padding-bottom:6px;border-bottom:1px solid var(--border)">💾 Data</h3>
        <div style="${card}">
          <div style="padding:13px 14px;display:flex;gap:8px">
            <button onclick="toast('⬇ Export started…')" style="background:var(--bg-card);color:var(--fg);border:1px solid var(--border-strong);border-radius:var(--radius-sm);padding:6px 11px;font-size:12.5px;cursor:pointer">⬇ Export JSON</button>
            <button onclick="toast('Type DELETE to confirm — real app only')" style="background:var(--bg-card);color:var(--danger);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 11px;font-size:12.5px;cursor:pointer">🗑 Clear all data</button>
          </div>
        </div>

      </div>
    </div>`;
}

function render() {
  renderSidebar();
  if (S.view === 'story')           renderStory();
  else if (S.view === 'meeting')    renderMeeting();
  else if (S.view === 'myboard')    renderMyBoard();
  else if (S.view === 'inbox')      renderMyBoard();
  else if (S.view === 'project')    renderProject();
  else if (S.view === 'settings')   renderSettings();
}

// keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// boot: restore from URL hash if present, otherwise default render
if (location.hash && location.hash.length > 1) {
  routeFromHash();
} else {
  render();
}
</script>
</body>
</html>
